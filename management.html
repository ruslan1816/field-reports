<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NW Field">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0696D7">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js?v=52"></script>
<script src="auth.js?v=52"></script>
<script src="cloud-save.js?v=52"></script>
<title>Management Dashboard — Northern Wolves AC</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { padding-bottom: 24px; }

  .mgmt-wrap {
    max-width: 900px;
    margin: 0 auto;
  }

  .header .profile-circle { margin-left: auto; }

  /* Stats row */
  .mgmt-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    padding: 16px;
  }
  @media (max-width: 500px) {
    .mgmt-stats { grid-template-columns: 1fr 1fr; }
  }
  .mgmt-stat {
    background: var(--nw-card);
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    padding: 14px 12px;
    text-align: center;
  }
  .mgmt-stat-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .mgmt-stat-value.total { color: var(--nw-primary); }
  .mgmt-stat-value.submitted { color: #f59e0b; }
  .mgmt-stat-value.reviewed { color: #8b5cf6; }
  .mgmt-stat-value.approved { color: #10b981; }
  .mgmt-stat-label {
    font-size: 11px;
    color: var(--nw-muted);
    font-weight: 600;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Filters */
  .mgmt-filters {
    padding: 0 16px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .mgmt-filters select, .mgmt-filters input {
    padding: 8px 10px;
    border: 1px solid var(--nw-border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--nw-card);
    color: var(--nw-text);
    font-family: inherit;
  }
  .mgmt-filters select { min-width: 130px; }
  .mgmt-filters input[type="text"] { flex: 1; min-width: 140px; }
  .mgmt-filters input[type="date"] { min-width: 130px; }

  /* Table */
  .mgmt-table-wrap {
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mgmt-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--nw-card);
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    overflow: hidden;
    font-size: 13px;
  }
  .mgmt-table th {
    background: var(--nw-section);
    padding: 10px 12px;
    text-align: left;
    font-weight: 700;
    color: var(--nw-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .mgmt-table td {
    padding: 10px 12px;
    border-top: 1px solid var(--nw-border);
    vertical-align: middle;
  }
  .mgmt-table tr:hover td { background: #f8fafc; }
  .mgmt-table tr[data-id] { cursor: pointer; }

  /* Mobile cards (hidden on desktop) */
  .mgmt-cards { display: none; padding: 0 12px; }
  .mgmt-card {
    background: var(--nw-card);
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .mgmt-card:hover { border-color: var(--nw-primary); }
  .mgmt-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .mgmt-card-type { font-weight: 700; font-size: 14px; }
  .mgmt-card-row { font-size: 13px; color: var(--nw-muted); margin-top: 2px; }
  .mgmt-card-row span { color: var(--nw-text); }
  .mgmt-card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

  @media (max-width: 700px) {
    .mgmt-table-wrap { display: none; }
    .mgmt-cards { display: block; }
  }

  /* Status select in detail */
  .status-select {
    padding: 6px 10px;
    border: 1px solid var(--nw-border);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: var(--nw-card);
  }

  /* Detail modal */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .detail-overlay.active { display: flex; }
  .detail-panel {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    padding: 24px;
    position: relative;
  }
  .detail-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--nw-muted);
    line-height: 1;
  }
  .detail-close:hover { color: var(--nw-text); }
  .detail-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .detail-subtitle {
    font-size: 13px;
    color: var(--nw-muted);
    margin-bottom: 16px;
  }
  .detail-section {
    margin-bottom: 16px;
  }
  .detail-section h4 {
    font-size: 12px;
    font-weight: 700;
    color: var(--nw-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }
  @media (max-width: 500px) {
    .detail-grid { grid-template-columns: 1fr; }
  }
  .detail-field {
    font-size: 13px;
  }
  .detail-field-label {
    font-weight: 600;
    color: var(--nw-muted);
    font-size: 11px;
    text-transform: uppercase;
  }
  .detail-field-value {
    color: var(--nw-text);
    margin-top: 2px;
    word-break: break-word;
  }
  .detail-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--nw-border);
  }
  .detail-actions label {
    font-size: 13px;
    font-weight: 600;
    color: var(--nw-muted);
  }

  .summary-text {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--nw-muted);
  }

  .loading-text {
    text-align: center;
    padding: 40px 16px;
    color: var(--nw-muted);
    font-size: 14px;
  }

  /* ===== Tab Navigation ===== */
  .mgmt-tabs {
    display: flex;
    padding: 0 16px;
    gap: 0;
    border-bottom: 2px solid var(--nw-border);
    margin-bottom: 0;
  }
  .mgmt-tab {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    color: var(--nw-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .mgmt-tab:hover { color: var(--nw-text); }
  .mgmt-tab.active {
    color: var(--nw-primary);
    border-bottom-color: var(--nw-primary);
  }
  .mgmt-tab-panel { display: none; }
  .mgmt-tab-panel.active { display: block; }

  /* ===== Team Section ===== */
  .team-list { padding: 16px; }
  .team-card {
    background: var(--nw-card);
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .team-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--nw-primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .team-avatar.inactive { background: #cbd5e1; }
  .team-info { flex: 1; min-width: 0; }
  .team-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--nw-text);
  }
  .team-meta {
    font-size: 12px;
    color: var(--nw-muted);
    margin-top: 2px;
  }
  .team-stats-col {
    text-align: right;
    flex-shrink: 0;
  }
  .team-report-count {
    font-size: 20px;
    font-weight: 800;
    color: var(--nw-primary);
    line-height: 1;
  }
  .team-report-label {
    font-size: 10px;
    color: var(--nw-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .role-badge.admin { background: #ede9fe; color: #7c3aed; }
  .role-badge.manager { background: #dbeafe; color: #2563eb; }
  .role-badge.pm { background: #d1fae5; color: #047857; }
  .role-badge.foreman { background: #fef3c7; color: #b45309; }
  .role-badge.tech { background: #f1f5f9; color: #64748b; }

  /* ===== Activity Timeline ===== */
  .activity-timeline { padding: 16px; }
  .timeline-item {
    display: flex;
    gap: 12px;
    padding-bottom: 16px;
    position: relative;
  }
  .timeline-item:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 19px;
    top: 40px;
    bottom: 0;
    width: 2px;
    background: var(--nw-border);
  }
  .timeline-dot {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    z-index: 1;
  }
  .timeline-dot.submitted { background: #fef3c7; }
  .timeline-dot.reviewed { background: #ede9fe; }
  .timeline-dot.approved { background: #d1fae5; }
  .timeline-dot.rejected { background: #fee2e2; }
  .timeline-dot.default { background: #f1f5f9; }
  .timeline-content { flex: 1; min-width: 0; }
  .timeline-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--nw-text);
    line-height: 1.4;
  }
  .timeline-title strong { color: var(--nw-primary); }
  .timeline-meta {
    font-size: 11px;
    color: var(--nw-muted);
    margin-top: 2px;
  }
  .timeline-report-link {
    font-size: 12px;
    color: var(--nw-primary);
    cursor: pointer;
    text-decoration: none;
    font-weight: 600;
  }
  .timeline-report-link:hover { text-decoration: underline; }

  /* ===== Date filter for activity ===== */
  .activity-filters {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .activity-filters select {
    padding: 8px 10px;
    border: 1px solid var(--nw-border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--nw-card);
    color: var(--nw-text);
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="mgmt-wrap">

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">&#8592;</a>
    <div class="header-content">
      <h1>Management Dashboard</h1>
    </div>
    <div class="profile-circle" id="profileCircle">--</div>
  </div>

  <!-- Tabs -->
  <div class="mgmt-tabs">
    <div class="mgmt-tab active" data-tab="reports">Reports</div>
    <div class="mgmt-tab" data-tab="team">Team</div>
    <div class="mgmt-tab" data-tab="activity">Activity</div>
  </div>

  <!-- ========== REPORTS TAB ========== -->
  <div class="mgmt-tab-panel active" id="panelReports">

  <!-- Stats -->
  <div class="mgmt-stats">
    <div class="mgmt-stat">
      <div class="mgmt-stat-value total" id="statTotal">-</div>
      <div class="mgmt-stat-label">Total</div>
    </div>
    <div class="mgmt-stat">
      <div class="mgmt-stat-value submitted" id="statSubmitted">-</div>
      <div class="mgmt-stat-label">Submitted</div>
    </div>
    <div class="mgmt-stat">
      <div class="mgmt-stat-value reviewed" id="statReviewed">-</div>
      <div class="mgmt-stat-label">Reviewed</div>
    </div>
    <div class="mgmt-stat">
      <div class="mgmt-stat-value approved" id="statApproved">-</div>
      <div class="mgmt-stat-label">Approved</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="mgmt-filters">
    <select id="filterType">
      <option value="">All Types</option>
      <option value="service-call">Service Call</option>
      <option value="startup">Start-Up</option>
      <option value="site-survey">Site Survey</option>
      <option value="pm-checklist">Maintenance</option>
      <option value="work-order">Work Order</option>
      <option value="change-order">Change Order</option>
      <option value="rfi">RFI</option>
    </select>
    <select id="filterStatus">
      <option value="">All Status</option>
      <option value="submitted">Submitted</option>
      <option value="reviewed">Reviewed</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
    <select id="filterTech">
      <option value="">All Techs</option>
    </select>
    <input type="text" id="filterSearch" placeholder="Search customer...">
  </div>

  <!-- Desktop Table -->
  <div class="mgmt-table-wrap">
    <table class="mgmt-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Customer</th>
          <th>Technician</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Mobile Cards -->
  <div class="mgmt-cards" id="cardContainer"></div>

  <!-- Loading / Empty -->
  <div class="loading-text" id="loadingState">Loading reports...</div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">📊</div>
    <p>No reports found.</p>
  </div>

  <div class="summary-text" id="summaryText"></div>

  </div><!-- /panelReports -->

  <!-- ========== TEAM TAB ========== -->
  <div class="mgmt-tab-panel" id="panelTeam">
    <div class="team-list" id="teamList">
      <div class="loading-text">Loading team...</div>
    </div>
  </div>

  <!-- ========== ACTIVITY TAB ========== -->
  <div class="mgmt-tab-panel" id="panelActivity">
    <div class="activity-filters">
      <select id="activityPeriod">
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="all">All time</option>
      </select>
      <select id="activityTech">
        <option value="">All Techs</option>
      </select>
    </div>
    <div class="activity-timeline" id="activityTimeline">
      <div class="loading-text">Loading activity...</div>
    </div>
  </div>

</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <button class="detail-close" id="detailClose">&times;</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-subtitle" id="detailSubtitle"></div>
    <div class="detail-section">
      <h4>Report Info</h4>
      <div class="detail-grid" id="detailInfo"></div>
    </div>
    <div class="detail-section" id="detailFormSection">
      <h4>Form Data</h4>
      <div class="detail-grid" id="detailFormData"></div>
    </div>
    <div class="detail-actions">
      <label>Status:</label>
      <select class="status-select" id="detailStatus">
        <option value="submitted">Submitted</option>
        <option value="reviewed">Reviewed</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
      <button class="btn btn-primary" id="btnSaveStatus" style="margin-left:auto; padding:8px 20px; font-size:13px;">Save</button>
    </div>
    <div class="detail-share" style="margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="btnShare" style="padding:8px 16px;font-size:13px;background:#0696D7;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;" onclick="shareReport()">🔗 Share Report</button>
      <span id="shareStatus" style="font-size:12px;color:#64748b;"></span>
      <button class="btn" id="btnRevokeShare" style="display:none;padding:6px 12px;font-size:12px;background:#fee2e2;color:#991b1b;border:none;border-radius:6px;font-weight:600;cursor:pointer;" onclick="revokeShare()">Revoke</button>
    </div>
  </div>
</div>

<script>
requireAuth().then(function() {
  return requireRole(['admin', 'manager', 'pm']);
}).catch(function(){
  // redirect handled by requireRole
});
(function() {
  'use strict';

  var TYPE_MAP = {
    'service-call': 'Service Call',
    'startup': 'Start-Up',
    'site-survey': 'Site Survey',
    'pm-checklist': 'Maintenance',
    'work-order': 'Work Order',
    'change-order': 'Change Order',
    'rfi': 'RFI'
  };

  var allReports = [];
  var currentReport = null;

  // --- Load all reports from Supabase ---
  async function loadReports() {
    try {
      var { data, error } = await supabaseClient
        .from('reports')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(500);

      if (error) {
        console.error('[mgmt] Load error:', error.message);
        document.getElementById('loadingState').textContent = 'Error loading reports.';
        return;
      }

      allReports = data || [];
      document.getElementById('loadingState').style.display = 'none';

      // Populate tech filter
      populateTechFilter();
      renderStats();
      render();
    } catch(e) {
      console.error('[mgmt] Exception:', e);
      document.getElementById('loadingState').textContent = 'Error loading reports.';
    }
  }

  function populateTechFilter() {
    var techs = {};
    allReports.forEach(function(r) {
      if (r.tech_name) techs[r.tech_name] = true;
    });
    var select = document.getElementById('filterTech');
    Object.keys(techs).sort().forEach(function(name) {
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
  }

  // --- Stats ---
  function renderStats() {
    var total = allReports.length;
    var submitted = allReports.filter(function(r) { return r.status === 'submitted'; }).length;
    var reviewed = allReports.filter(function(r) { return r.status === 'reviewed'; }).length;
    var approved = allReports.filter(function(r) { return r.status === 'approved'; }).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statSubmitted').textContent = submitted;
    document.getElementById('statReviewed').textContent = reviewed;
    document.getElementById('statApproved').textContent = approved;
  }

  // --- Filters ---
  function getFiltered() {
    var typeFilter = document.getElementById('filterType').value;
    var statusFilter = document.getElementById('filterStatus').value;
    var techFilter = document.getElementById('filterTech').value;
    var searchFilter = document.getElementById('filterSearch').value.trim().toLowerCase();

    return allReports.filter(function(r) {
      if (typeFilter && r.report_type !== typeFilter) return false;
      if (statusFilter && r.status !== statusFilter) return false;
      if (techFilter && r.tech_name !== techFilter) return false;
      if (searchFilter && (r.customer_name || '').toLowerCase().indexOf(searchFilter) === -1) return false;
      return true;
    });
  }

  // --- Format helpers ---
  function fmtDate(dateStr) {
    if (!dateStr) return '—';
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function statusBadge(status) {
    var cls = 'badge ';
    if (status === 'submitted') cls += 'badge-submitted';
    else if (status === 'reviewed') cls += 'badge-reviewed';
    else if (status === 'approved') cls += 'badge-completed';
    else if (status === 'rejected') cls += 'badge-rejected';
    else cls += 'badge-draft';
    var label = (status || 'unknown').charAt(0).toUpperCase() + (status || '').slice(1);
    return '<span class="' + cls + '">' + label + '</span>';
  }

  // --- Render ---
  function render() {
    var filtered = getFiltered();
    var tableBody = document.getElementById('tableBody');
    var cardContainer = document.getElementById('cardContainer');
    var emptyState = document.getElementById('emptyState');
    var summaryText = document.getElementById('summaryText');

    if (filtered.length === 0) {
      tableBody.innerHTML = '';
      cardContainer.innerHTML = '';
      emptyState.style.display = '';
      summaryText.textContent = '';
      return;
    }

    emptyState.style.display = 'none';
    summaryText.textContent = filtered.length === allReports.length
      ? filtered.length + ' reports'
      : 'Showing ' + filtered.length + ' of ' + allReports.length + ' reports';

    // Desktop table
    var rowsHtml = '';
    filtered.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.report_type] || r.report_type || '—';
      rowsHtml += '<tr data-id="' + r.id + '">' +
        '<td>' + fmtDate(r.report_date) + '</td>' +
        '<td>' + typeLabel + '</td>' +
        '<td>' + (r.customer_name || '—') + '</td>' +
        '<td>' + (r.tech_name || '—') + '</td>' +
        '<td>' + statusBadge(r.status) + '</td>' +
        '</tr>';
    });
    tableBody.innerHTML = rowsHtml;

    // Mobile cards
    var cardsHtml = '';
    filtered.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.report_type] || r.report_type || '—';
      cardsHtml += '<div class="mgmt-card" data-id="' + r.id + '">' +
        '<div class="mgmt-card-top">' +
          '<span class="mgmt-card-type">' + typeLabel + '</span>' +
          statusBadge(r.status) +
        '</div>' +
        '<div class="mgmt-card-row">Customer: <span>' + (r.customer_name || '—') + '</span></div>' +
        '<div class="mgmt-card-row">Tech: <span>' + (r.tech_name || '—') + '</span></div>' +
        '<div class="mgmt-card-bottom">' +
          '<span style="font-size:12px;color:var(--nw-muted)">' + fmtDate(r.report_date) + '</span>' +
          '<span style="font-size:11px;color:var(--nw-muted)">' + (r.report_number || '') + '</span>' +
        '</div>' +
      '</div>';
    });
    cardContainer.innerHTML = cardsHtml;
  }

  // --- Detail modal ---
  function openDetail(reportId) {
    var report = allReports.find(function(r) { return r.id === reportId; });
    if (!report) return;
    currentReport = report;

    var typeLabel = TYPE_MAP[report.report_type] || report.report_type || 'Report';
    document.getElementById('detailTitle').textContent = typeLabel;
    document.getElementById('detailSubtitle').textContent =
      (report.report_number || '') + ' — ' + fmtDate(report.report_date);

    // Info grid
    var infoHtml = '';
    infoHtml += field('Customer', report.customer_name);
    infoHtml += field('Technician', report.tech_name);
    infoHtml += field('Date', fmtDate(report.report_date));
    infoHtml += field('Report #', report.report_number);
    infoHtml += field('Status', report.status);
    infoHtml += field('Submitted', fmtDate(report.created_at));
    document.getElementById('detailInfo').innerHTML = infoHtml;

    // Form data — show meaningful fields, skip raw data
    var fd = report.form_data || {};
    var fdHtml = '';
    // Keys to always skip (already shown above, or binary/internal data)
    var skipKeys = ['reportId', 'custName', 'customerName', 'customer', 'techName', 'fromName',
                    'callDate', 'suDate', 'pmDate', 'coDate', 'woDate', 'surveyDate', 'rfiDate',
                    'photos', 'photosByEquip', 'techSig', 'custSig', 'readings'];
    // Priority fields to show first in nice order
    var priorityKeys = ['custAddress', 'address', 'custContact', 'custPhone', 'custEmail',
                        'workOrder', 'callType', 'timeArrive', 'timeDepart',
                        'complaint', 'diagnosis', 'workPerformed', 'recommendations',
                        'scopeOfWork', 'materialsUsed', 'findings', 'siteConditions',
                        'changeDescription', 'reason', 'question', 'response',
                        'systemStatus', 'statusNotes', 'refAdded',
                        'regHours', 'otHours', 'travelTime', 'custPrintName'];
    var shown = {};

    // Show priority fields first
    priorityKeys.forEach(function(key) {
      var val = fd[key];
      if (val === null || val === undefined || val === '') return;
      if (typeof val === 'object') return;
      fdHtml += field(humanize(key), String(val));
      shown[key] = true;
    });

    // Show equipment summary
    if (fd.equipment && Array.isArray(fd.equipment) && fd.equipment.length > 0) {
      var equipSummary = fd.equipment.map(function(e) {
        return [e.type, e.mfg, e.model].filter(Boolean).join(' — ') +
          (e.serial ? ' (S/N: ' + e.serial + ')' : '');
      }).join('<br>');
      fdHtml += field('Equipment', equipSummary);
      shown['equipment'] = true;
    }

    // Show parts summary
    if (fd.parts && Array.isArray(fd.parts) && fd.parts.length > 0) {
      var partsFiltered = fd.parts.filter(function(p) { return p.desc || p.description; });
      if (partsFiltered.length > 0) {
        var partsSummary = partsFiltered.map(function(p) {
          return (p.desc || p.description) + (p.qty && p.qty !== '1' ? ' (x' + p.qty + ')' : '');
        }).join(', ');
        fdHtml += field('Parts', partsSummary);
      }
      shown['parts'] = true;
    }

    // Show photo count
    var photoCount = 0;
    if (fd.photosByEquip) {
      Object.keys(fd.photosByEquip).forEach(function(k) {
        if (Array.isArray(fd.photosByEquip[k])) photoCount += fd.photosByEquip[k].length;
      });
    } else if (fd.photos && Array.isArray(fd.photos)) {
      photoCount = fd.photos.length;
    }
    if (photoCount > 0) {
      fdHtml += field('Photos', photoCount + ' photo' + (photoCount !== 1 ? 's' : '') + ' attached');
    }

    // Show remaining simple string fields not yet shown
    Object.keys(fd).forEach(function(key) {
      if (skipKeys.indexOf(key) !== -1 || shown[key]) return;
      var val = fd[key];
      if (val === null || val === undefined || val === '') return;
      if (typeof val === 'object') {
        // Skip empty arrays/objects
        if (Array.isArray(val) && val.length === 0) return;
        if (Object.keys(val).length === 0) return;
        // Skip objects with base64 data
        var json = JSON.stringify(val);
        if (json.indexOf('data:image') !== -1 || json.length > 500) return;
        val = JSON.stringify(val, null, 2);
        if (val.length > 200) val = val.substring(0, 200) + '...';
      }
      fdHtml += field(humanize(key), String(val));
    });

    document.getElementById('detailFormData').innerHTML = fdHtml || '<p style="color:var(--nw-muted);font-size:13px;">No additional data</p>';

    // Status select
    document.getElementById('detailStatus').value = report.status || 'submitted';

    // Share status
    updateShareUI(report);

    document.getElementById('detailOverlay').classList.add('active');
  }

  function updateShareUI(report) {
    var statusEl = document.getElementById('shareStatus');
    var revokeBtn = document.getElementById('btnRevokeShare');
    var shareBtn = document.getElementById('btnShare');
    if (report.share_token) {
      var url = window.location.origin + window.location.pathname.replace('management.html', 'report-view.html') + '?token=' + report.share_token;
      statusEl.innerHTML = '<a href="' + url + '" target="_blank" style="color:#0696D7;font-size:12px;">View shared link</a>';
      revokeBtn.style.display = '';
      shareBtn.textContent = '📋 Copy Link';
    } else {
      statusEl.textContent = '';
      revokeBtn.style.display = 'none';
      shareBtn.textContent = '🔗 Share Report';
    }
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('active');
    currentReport = null;
  }

  function field(label, value) {
    return '<div class="detail-field">' +
      '<div class="detail-field-label">' + label + '</div>' +
      '<div class="detail-field-value">' + (value || '—') + '</div>' +
    '</div>';
  }

  function humanize(key) {
    return key
      .replace(/([A-Z])/g, ' $1')
      .replace(/[_-]/g, ' ')
      .replace(/^\w/, function(c) { return c.toUpperCase(); })
      .trim();
  }

  // --- Save status ---
  async function saveStatus() {
    if (!currentReport) return;
    var newStatus = document.getElementById('detailStatus').value;
    if (newStatus === currentReport.status) {
      closeDetail();
      return;
    }

    try {
      var { error } = await supabaseClient
        .from('reports')
        .update({ status: newStatus })
        .eq('id', currentReport.id);

      if (error) {
        alert('Error updating status: ' + error.message);
        return;
      }

      // Update local data
      currentReport.status = newStatus;
      renderStats();
      render();
      closeDetail();
    } catch(e) {
      alert('Error: ' + e.message);
    }
  }

  // --- Share report ---
  window.shareReport = async function() {
    if (!currentReport) return;

    // If already shared, copy the link
    if (currentReport.share_token) {
      var url = window.location.origin + window.location.pathname.replace('management.html', 'report-view.html') + '?token=' + currentReport.share_token;
      try {
        await navigator.clipboard.writeText(url);
        document.getElementById('shareStatus').textContent = 'Link copied!';
        setTimeout(function() { updateShareUI(currentReport); }, 2000);
      } catch(e) {
        prompt('Copy this link:', url);
      }
      return;
    }

    // Generate a share token
    var token = crypto.randomUUID();
    var btn = document.getElementById('btnShare');
    btn.disabled = true;
    btn.textContent = 'Sharing...';

    try {
      var { error } = await supabaseClient
        .from('reports')
        .update({ share_token: token })
        .eq('id', currentReport.id);

      if (error) {
        alert('Error sharing: ' + error.message);
        btn.disabled = false;
        btn.textContent = '🔗 Share Report';
        return;
      }

      currentReport.share_token = token;
      updateShareUI(currentReport);
      btn.disabled = false;

      // Copy to clipboard
      var url = window.location.origin + window.location.pathname.replace('management.html', 'report-view.html') + '?token=' + token;
      try {
        await navigator.clipboard.writeText(url);
        document.getElementById('shareStatus').innerHTML += ' — Link copied!';
      } catch(e) {
        prompt('Share this link with the customer:', url);
      }
    } catch(e) {
      alert('Error: ' + e.message);
      btn.disabled = false;
      btn.textContent = '🔗 Share Report';
    }
  };

  window.revokeShare = async function() {
    if (!currentReport) return;
    if (!confirm('Revoke the share link? The customer will no longer be able to view this report.')) return;

    try {
      var { error } = await supabaseClient
        .from('reports')
        .update({ share_token: null })
        .eq('id', currentReport.id);

      if (error) {
        alert('Error revoking: ' + error.message);
        return;
      }

      currentReport.share_token = null;
      updateShareUI(currentReport);
    } catch(e) {
      alert('Error: ' + e.message);
    }
  };

  // --- Profile circle ---
  function loadProfile() {
    try {
      var profile = JSON.parse(localStorage.getItem('nw_tech_profile') || '{}');
      var name = profile.name || profile.full_name || '';
      if (name) {
        var parts = name.trim().split(/\s+/);
        var initials = parts.length >= 2
          ? parts[0][0] + parts[parts.length - 1][0]
          : name.substring(0, 2);
        document.getElementById('profileCircle').textContent = initials.toUpperCase();
      }
    } catch(e) {}
  }

  // --- Tabs ---
  var tabsContainer = document.querySelector('.mgmt-tabs');
  tabsContainer.addEventListener('click', function(e) {
    var tab = e.target.closest('.mgmt-tab');
    if (!tab) return;
    var target = tab.getAttribute('data-tab');

    // Update tab active state
    tabsContainer.querySelectorAll('.mgmt-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');

    // Show correct panel
    document.querySelectorAll('.mgmt-tab-panel').forEach(function(p) { p.classList.remove('active'); });
    var panel = document.getElementById('panel' + target.charAt(0).toUpperCase() + target.slice(1));
    if (panel) panel.classList.add('active');

    // Lazy load
    if (target === 'team' && !teamLoaded) loadTeam();
    if (target === 'activity' && !activityLoaded) loadActivity();
  });

  // --- Team ---
  var teamLoaded = false;
  var allProfiles = [];

  async function loadTeam() {
    try {
      var { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .order('full_name', { ascending: true });

      if (error) {
        document.getElementById('teamList').innerHTML = '<div class="loading-text">Error loading team.</div>';
        return;
      }

      allProfiles = data || [];
      teamLoaded = true;
      renderTeam();
    } catch(e) {
      document.getElementById('teamList').innerHTML = '<div class="loading-text">Error loading team.</div>';
    }
  }

  function renderTeam() {
    var container = document.getElementById('teamList');
    if (allProfiles.length === 0) {
      container.innerHTML = '<div class="loading-text">No team members found.</div>';
      return;
    }

    // Count reports per tech
    var reportCounts = {};
    allReports.forEach(function(r) {
      var techId = r.tech_id || '';
      if (techId) {
        reportCounts[techId] = (reportCounts[techId] || 0) + 1;
      }
      // Also count by name for matching
      var techName = r.tech_name || '';
      if (techName) {
        if (!reportCounts['name_' + techName]) reportCounts['name_' + techName] = 0;
        reportCounts['name_' + techName]++;
      }
    });

    var html = '';
    allProfiles.forEach(function(p) {
      var name = p.full_name || p.email || 'Unknown';
      var initials = name.split(' ').map(function(w) { return w.charAt(0); }).join('').toUpperCase().substring(0, 2);
      var role = p.role || 'tech';
      var isActive = p.is_active !== false;
      var count = reportCounts[p.id] || reportCounts['name_' + name] || 0;

      // Last report date
      var lastReport = null;
      allReports.forEach(function(r) {
        if ((r.tech_id === p.id || r.tech_name === name) && r.created_at) {
          if (!lastReport || r.created_at > lastReport) lastReport = r.created_at;
        }
      });

      html += '<div class="team-card">';
      html += '<div class="team-avatar' + (isActive ? '' : ' inactive') + '">' + initials + '</div>';
      html += '<div class="team-info">';
      html += '<div class="team-name">' + escHtml(name) + (!isActive ? ' <span style="color:#94a3b8;font-weight:400;font-size:12px">(inactive)</span>' : '') + '</div>';
      html += '<div class="team-meta">';
      html += '<span class="role-badge ' + role + '">' + role + '</span>';
      if (p.email) html += ' &nbsp;' + escHtml(p.email);
      html += '</div>';
      if (lastReport) {
        html += '<div class="team-meta">Last report: ' + fmtDate(lastReport) + '</div>';
      }
      html += '</div>';
      html += '<div class="team-stats-col">';
      html += '<div class="team-report-count">' + count + '</div>';
      html += '<div class="team-report-label">Reports</div>';
      html += '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  // --- Activity Timeline ---
  var activityLoaded = false;

  async function loadActivity() {
    activityLoaded = true;
    renderActivity();

    // Populate activity tech filter
    var select = document.getElementById('activityTech');
    if (select.options.length <= 1) {
      var techs = {};
      allReports.forEach(function(r) { if (r.tech_name) techs[r.tech_name] = true; });
      Object.keys(techs).sort().forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    }
  }

  function renderActivity() {
    var container = document.getElementById('activityTimeline');
    var periodVal = document.getElementById('activityPeriod').value;
    var techVal = document.getElementById('activityTech').value;

    // Filter reports by period
    var cutoff = null;
    if (periodVal !== 'all') {
      cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - parseInt(periodVal));
    }

    var filtered = allReports.filter(function(r) {
      if (techVal && r.tech_name !== techVal) return false;
      if (cutoff && r.created_at) {
        var d = new Date(r.created_at);
        if (d < cutoff) return false;
      }
      return true;
    });

    // Sort by created_at descending
    filtered.sort(function(a, b) {
      return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    });

    // Limit to 50 most recent
    filtered = filtered.slice(0, 50);

    if (filtered.length === 0) {
      container.innerHTML = '<div class="loading-text">No activity in this period.</div>';
      return;
    }

    var statusIcons = {
      submitted: '📤',
      reviewed: '👀',
      approved: '✅',
      rejected: '❌'
    };
    var statusVerbs = {
      submitted: 'submitted',
      reviewed: 'reviewed',
      approved: 'approved',
      rejected: 'rejected'
    };

    var html = '';
    var lastDate = '';

    filtered.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.report_type] || r.report_type || 'Report';
      var status = r.status || 'submitted';
      var icon = statusIcons[status] || '📋';
      var dotClass = statusIcons[status] ? status : 'default';
      var verb = statusVerbs[status] || 'created';

      // Date separator
      var dateStr = fmtDate(r.created_at);
      if (dateStr !== lastDate) {
        html += '<div style="font-size:11px;font-weight:700;color:var(--nw-muted);text-transform:uppercase;letter-spacing:0.8px;padding:8px 0 4px;margin-top:' + (lastDate ? '8px' : '0') + '">' + dateStr + '</div>';
        lastDate = dateStr;
      }

      html += '<div class="timeline-item">';
      html += '<div class="timeline-dot ' + dotClass + '">' + icon + '</div>';
      html += '<div class="timeline-content">';
      html += '<div class="timeline-title"><strong>' + escHtml(r.tech_name || 'Unknown') + '</strong> ' + verb + ' a ' + typeLabel + '</div>';
      html += '<div class="timeline-meta">';
      if (r.customer_name) html += escHtml(r.customer_name) + ' &middot; ';
      if (r.report_number) html += r.report_number + ' &middot; ';
      html += timeAgo(r.created_at);
      html += '</div>';
      html += '<span class="timeline-report-link" data-report-id="' + r.id + '">View Report →</span>';
      html += '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function timeAgo(iso) {
    if (!iso) return '';
    var now = Date.now();
    var then = new Date(iso).getTime();
    var diff = now - then;
    if (isNaN(diff) || diff < 0) return '';
    var mins = Math.floor(diff / 60000);
    var hrs = Math.floor(mins / 60);
    var days = Math.floor(hrs / 24);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    if (hrs < 24) return hrs + 'h ago';
    if (days === 1) return 'Yesterday';
    if (days < 7) return days + 'd ago';
    return fmtDate(iso);
  }

  // Activity filter events
  document.getElementById('activityPeriod').addEventListener('change', function() {
    if (activityLoaded) renderActivity();
  });
  document.getElementById('activityTech').addEventListener('change', function() {
    if (activityLoaded) renderActivity();
  });

  // Activity timeline click → open report detail
  document.getElementById('activityTimeline').addEventListener('click', function(e) {
    var link = e.target.closest('.timeline-report-link');
    if (link) {
      var reportId = link.getAttribute('data-report-id');
      if (reportId) {
        // Switch to reports tab and open detail
        tabsContainer.querySelector('[data-tab="reports"]').click();
        setTimeout(function() { openDetail(reportId); }, 100);
      }
    }
  });

  // --- Events ---
  // Filter changes
  ['filterType', 'filterStatus', 'filterTech'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', render);
  });

  var searchTimer = null;
  document.getElementById('filterSearch').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 300);
  });

  // Table row click
  document.getElementById('tableBody').addEventListener('click', function(e) {
    var row = e.target.closest('tr[data-id]');
    if (row) openDetail(row.getAttribute('data-id'));
  });

  // Card click
  document.getElementById('cardContainer').addEventListener('click', function(e) {
    var card = e.target.closest('.mgmt-card[data-id]');
    if (card) openDetail(card.getAttribute('data-id'));
  });

  // Detail close
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  // Save status
  document.getElementById('btnSaveStatus').addEventListener('click', saveStatus);

  // --- Init ---
  loadProfile();
  loadReports();
})();
</script>
