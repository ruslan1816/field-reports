<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NW Field">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0696D7">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js?v=122"></script>
<script src="auth.js?v=122"></script>
<script src="cloud-save.js?v=122"></script>
<title>Report History — Northern Wolves AC</title>
<link rel="stylesheet" href="styles.css">
<script src="draft-utils.js?v=122"></script>
<style>
  body { padding-bottom: 0; }

  .header .profile-circle { margin-left: auto; }

  .history-wrap {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Table desktop view */
  .history-table { margin: 0 16px 24px; }
  .history-table .table-clean { border: var(--nw-border-width) solid var(--nw-border); border-radius: var(--nw-radius-card); overflow: hidden; background: var(--nw-card); }
  .history-table .table-clean th:last-child,
  .history-table .table-clean td:last-child { text-align: center; }
  .history-table .table-clean tr[data-link] { cursor: pointer; }
  .history-table .table-clean tr[data-link]:hover { background: #e8f4fd; }

  /* Edit indicator for cloud reports */
  .edit-indicator {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    color: var(--nw-primary);
    font-weight: 600;
    vertical-align: middle;
  }
  .history-card .edit-indicator {
    float: right;
    font-size: 12px;
    margin-top: 2px;
  }

  /* Mobile card view */
  .history-cards { display: none; padding: 0 12px 24px; }
  .history-card {
    background: var(--nw-card);
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    padding: 14px 16px;
    margin-bottom: 8px;
    text-decoration: none;
    color: var(--nw-text);
    display: block;
    transition: border-color 0.15s ease;
  }
  .history-card:hover { border-color: var(--nw-primary); }
  .history-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .history-card-type { font-weight: 700; font-size: 14px; }
  .history-card-date { font-size: 12px; color: var(--nw-muted); }
  .history-card-row { font-size: 13px; color: var(--nw-muted); margin-top: 2px; }
  .history-card-row span { color: var(--nw-text); }

  /* Delete button — small trash icon */
  .delete-btn {
    background: transparent;
    border: 1px solid transparent;
    color: #b91c1c;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
    opacity: 0.55;
    transition: all 0.15s ease;
    line-height: 1;
  }
  .delete-btn:hover {
    background: #fee2e2;
    border-color: #fecaca;
    opacity: 1;
  }
  .history-card .delete-btn {
    float: right;
    margin-left: 4px;
    margin-top: -2px;
  }
  /* Stop the row click from firing when you click the delete button */
  .history-table tr td .delete-btn { vertical-align: middle; }

  .summary-text {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--nw-muted);
  }

  @media (max-width: 600px) {
    .history-table { display: none; }
    .history-cards { display: block; }
  }

  /* Create New report button (big, prominent) */
  .create-new-bar {
    margin: 0 16px 16px;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }
  .create-new-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #0696D7, #0479B2);
    color: #fff;
    border: none;
    border-radius: var(--nw-radius-card);
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 12px rgba(6, 150, 215, 0.25);
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }
  .create-new-btn:hover {
    box-shadow: 0 6px 16px rgba(6, 150, 215, 0.35);
  }
  .create-new-btn:active {
    transform: translateY(1px);
  }
  .create-new-btn .plus-icon {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  /* Project folder grouping */
  .project-group {
    margin: 0 16px 16px;
    border: var(--nw-border-width) solid var(--nw-border);
    border-radius: var(--nw-radius-card);
    background: var(--nw-card);
    overflow: hidden;
  }
  .project-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #f8fafc;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--nw-border);
    transition: background 0.15s ease;
  }
  .project-group-header:hover { background: #f1f5f9; }
  .project-group-header.collapsed { border-bottom: none; }
  .project-group-chevron {
    font-size: 14px;
    color: var(--nw-muted);
    transition: transform 0.2s ease;
    width: 14px;
  }
  .project-group-header.collapsed .project-group-chevron {
    transform: rotate(-90deg);
  }
  .project-group-icon {
    font-size: 18px;
  }
  .project-group-name {
    flex: 1;
    font-weight: 700;
    font-size: 15px;
    color: var(--nw-text);
  }
  .project-group-subtitle {
    font-size: 12px;
    color: var(--nw-muted);
    font-weight: 400;
    margin-left: 6px;
  }
  .project-group-count {
    background: var(--nw-primary);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 10px;
    min-width: 22px;
    text-align: center;
  }
  .project-group-body {
    overflow: hidden;
  }
  .project-group-header.collapsed + .project-group-body {
    display: none;
  }
  /* Inside a project group, the table/cards are borderless */
  .project-group-body .history-table,
  .project-group-body .history-cards {
    margin: 0;
  }
  .project-group-body .history-table .table-clean {
    border: none;
    border-radius: 0;
  }
  .project-group-body .history-card {
    border: none;
    border-bottom: 1px solid var(--nw-border);
    border-radius: 0;
    margin: 0;
  }
  .project-group-body .history-card:last-child {
    border-bottom: none;
  }

  /* Hide Type column in the desktop table when we're filtering by one type */
  body.single-type .history-table .table-clean th:nth-child(2),
  body.single-type .history-table .table-clean td:nth-child(2) {
    display: none;
  }
</style>
</head>
<body>

<div class="history-wrap">

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">&#8592;</a>
    <div class="header-content">
      <h1 id="pageTitle">Report History</h1>
    </div>
    <div class="profile-circle" id="profileCircle">--</div>
  </div>

  <!-- Create New report — shown only when URL has ?type=X -->
  <div class="create-new-bar" id="createNewBar" style="display:none">
    <a class="create-new-btn" id="createNewBtn" href="#">
      <span class="plus-icon">+</span>
      <span id="createNewLabel">Create New Report</span>
    </a>
  </div>

  <!-- Status Tabs -->
  <div class="status-tabs" id="statusTabs">
    <div class="tab active" data-filter="all">All <span class="count" id="countAll">0</span></div>
    <div class="tab" data-filter="draft">Drafts <span class="count" id="countDrafts">0</span></div>
    <div class="tab" data-filter="submitted">Submitted <span class="count" id="countSubmitted">0</span></div>
    <div class="tab" data-filter="completed">Completed <span class="count" id="countCompleted">0</span></div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by customer, project, address, tech, or type...">
  </div>

  <!-- Desktop Table View -->
  <div class="history-table">
    <table class="table-clean">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Customer</th>
          <th>Project</th>
          <th>Address</th>
          <th>Technician</th>
          <th>Status</th>
          <th style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Mobile Card View -->
  <div class="history-cards" id="cardContainer"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">📄</div>
    <p>No reports found.<br>Start a new report from the dashboard.</p>
  </div>

  <div class="summary-text" id="summaryText"></div>

</div>

<script>
requireAuth().catch(function(){});
(function() {
  'use strict';

  // --- Type label mapping ---
  var TYPE_MAP = {
    'service-call': 'Service Call',
    'startup': 'Start-Up',
    'site-survey': 'Site Survey',
    'pm-checklist': 'Maintenance',
    'work-order': 'Work Order',
    'change-order': 'Change Order',
    'rfi': 'RFI'
  };

  // --- Form page mapping ---
  var FORM_MAP = {
    'service-call': 'service-call-report.html',
    'startup': 'startup-report.html',
    'site-survey': 'site-survey-report.html',
    'pm-checklist': 'pm-checklist.html',
    'work-order': 'work-order.html',
    'change-order': 'change-order.html',
    'rfi': 'rfi.html'
  };

  var allReports = [];
  var activeFilter = 'all';
  var searchTerm = '';
  var debounceTimer = null;

  // --- URL param: ?type=X filters to one report type + enables "+ New" button ---
  var typeFilter = null;
  (function() {
    var params = new URLSearchParams(window.location.search);
    var t = params.get('type');
    if (t && FORM_MAP[t]) {
      typeFilter = t;
      document.body.classList.add('single-type');
      // Update page title
      var label = TYPE_MAP[t] || t;
      var titleEl = document.getElementById('pageTitle');
      if (titleEl) titleEl.textContent = label + 's';
      document.title = label + 's — Northern Wolves AC';

      // Show + New button
      var bar = document.getElementById('createNewBar');
      var btn = document.getElementById('createNewBtn');
      var lbl = document.getElementById('createNewLabel');
      if (bar && btn && lbl) {
        bar.style.display = '';
        btn.href = FORM_MAP[t];
        lbl.textContent = 'Create New ' + label;
      }
    }
  })();

  // --- Load and normalize data ---
  function loadReports() {
    var drafts = [];
    try { drafts = JSON.parse(localStorage.getItem('nw_drafts') || '[]'); } catch(e) {}

    allReports = [];

    drafts.forEach(function(d) {
      allReports.push({
        date: d.lastModified || d.date || '',
        type: d.type || '',
        customer: d.customer || d.title || '',
        projectName: d.projectName || d.project || '',
        projectAddress: d.address || d.projectAddress || d.siteAddress || '',
        techName: d.techName || '',
        status: 'draft',
        source: 'local',
        link: (d.formPage || FORM_MAP[d.type] || '') + '?draft=' + d.id,
        sortDate: new Date(d.lastModified || d.date || 0)
      });
    });

    // Local nw_history is intentionally SKIPPED — cloud (Supabase) is now the
    // source of truth for completed reports (every submit upserts there).
    // Including local history just creates un-clickable twins of cloud rows.
    // Local drafts above are still loaded because drafts haven't hit the
    // cloud yet.

    // Sort newest first
    allReports.sort(function(a, b) { return b.sortDate - a.sortDate; });
  }

  // --- Merge cloud report rows into allReports (replaces any existing cloud entries) ---
  // Cache key bumped to v3 so any prior caches get invalidated.
  var CLOUD_CACHE_KEY = 'nw_cloud_reports_cache_v3';

  // Slim select — top-level columns only. (Previous attempt to extract
  // project_name / project_address from form_data JSONB via PostgREST aliases
  // caused the query to error out silently and wiped the entire cloud list.
  // We'll populate project info via a proper schema migration — adding
  // project_name and project_address columns on the reports table — in a
  // follow-up. For cloud rows, those two columns in the UI will show '—'
  // until the migration lands. Local drafts/history still show project info.)
  var CLOUD_SELECT_COLS =
    'id,report_number,report_type,report_date,customer_name,tech_name,tech_id,status,created_at';

  function mergeCloudRows(rows) {
    // Drop any existing cloud entries — we'll re-add fresh ones
    allReports = allReports.filter(function(r) { return r.source !== 'cloud'; });

    // Build a set of local report numbers to avoid showing the same report twice
    var existingNumbers = {};
    allReports.forEach(function(r) {
      if (r.reportNumber) existingNumbers[r.reportNumber] = true;
    });

    rows.forEach(function(row) {
      if (existingNumbers[row.report_number]) return;

      var editLink = FORM_MAP[row.report_type] ? FORM_MAP[row.report_type] + '?edit=' + row.id : '';
      allReports.push({
        date: row.report_date || row.created_at || '',
        type: row.report_type || '',
        customer: row.customer_name || '',
        projectName: row.project_name || '',
        projectAddress: row.project_address || '',
        techName: row.tech_name || '',
        status: row.status === 'draft' ? 'draft' : 'completed',
        source: 'cloud',
        reportNumber: row.report_number,
        cloudId: row.id,
        link: editLink,
        sortDate: new Date(row.created_at || row.report_date || 0)
      });
    });

    allReports.sort(function(a, b) { return b.sortDate - a.sortDate; });
  }

  // --- Render instantly from cached cloud data, then refresh in background ---
  async function loadCloudReports() {
    // 1) INSTANT: Render from localStorage cache if we have one (current key
    //    first, then older keys as a fallback so an SW upgrade doesn't leave
    //    users staring at an empty list while the fresh fetch is in flight).
    var cacheKeysToTry = [CLOUD_CACHE_KEY, 'nw_cloud_reports_cache_v2', 'nw_cloud_reports_cache'];
    for (var i = 0; i < cacheKeysToTry.length; i++) {
      try {
        var cached = JSON.parse(localStorage.getItem(cacheKeysToTry[i]) || 'null');
        if (cached && Array.isArray(cached.rows) && cached.rows.length) {
          mergeCloudRows(cached.rows);
          render();
          break;
        }
      } catch(e) {}
    }

    // 2) BACKGROUND: Fetch fresh from Supabase, update cache, re-render
    try {
      if (typeof getCloudReports !== 'function') return;
      var result = await getCloudReports({ limit: 200, select: CLOUD_SELECT_COLS });
      if (result.error) {
        console.error('[history] Cloud fetch error:', result.error);
        return;
      }
      if (!result.data) return;

      // Save to cache for next visit (instant render)
      try {
        localStorage.setItem(CLOUD_CACHE_KEY, JSON.stringify({
          ts: Date.now(),
          rows: result.data
        }));
      } catch(e) { /* quota exceeded — ignore */ }

      mergeCloudRows(result.data);
      render();
    } catch(err) {
      console.error('[history] Cloud load error:', err);
    }
  }

  // --- Filter reports ---
  function getFiltered() {
    var filtered = allReports;

    // URL-param type filter
    if (typeFilter) {
      filtered = filtered.filter(function(r) { return r.type === typeFilter; });
    }

    if (activeFilter === 'draft') {
      filtered = filtered.filter(function(r) { return r.status === 'draft'; });
    } else if (activeFilter === 'submitted') {
      filtered = filtered.filter(function(r) { return r.status === 'submitted'; });
    } else if (activeFilter === 'completed') {
      filtered = filtered.filter(function(r) { return r.status === 'completed'; });
    }

    if (searchTerm) {
      var q = searchTerm.toLowerCase();
      filtered = filtered.filter(function(r) {
        var typeLabel = (TYPE_MAP[r.type] || r.type || '').toLowerCase();
        return (r.customer || '').toLowerCase().indexOf(q) !== -1 ||
               (r.techName || '').toLowerCase().indexOf(q) !== -1 ||
               (r.projectName || '').toLowerCase().indexOf(q) !== -1 ||
               (r.projectAddress || '').toLowerCase().indexOf(q) !== -1 ||
               typeLabel.indexOf(q) !== -1;
      });
    }

    return filtered;
  }

  // --- Format date ---
  function fmtDate(dateStr) {
    if (!dateStr) return '—';
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // --- Render ---
  function render() {
    var filtered = getFiltered();
    var tableBody = document.getElementById('tableBody');
    var cardContainer = document.getElementById('cardContainer');
    var emptyState = document.getElementById('emptyState');
    var summaryText = document.getElementById('summaryText');
    var tableWrap = document.querySelector('.history-table');
    var cardsWrap = document.getElementById('cardContainer');

    // For tab counts, honor the type filter (so Drafts/Submitted/Completed tabs
    // reflect only the currently-viewed report type when ?type=X is set)
    var forCounts = typeFilter
      ? allReports.filter(function(r) { return r.type === typeFilter; })
      : allReports;
    var draftCount = forCounts.filter(function(r) { return r.status === 'draft'; }).length;
    var submittedCount = forCounts.filter(function(r) { return r.status === 'submitted'; }).length;
    var completedCount = forCounts.filter(function(r) { return r.status === 'completed'; }).length;
    document.getElementById('countAll').textContent = forCounts.length;
    document.getElementById('countDrafts').textContent = draftCount;
    document.getElementById('countSubmitted').textContent = submittedCount;
    document.getElementById('countCompleted').textContent = completedCount;

    // --- Project-grouped render when type is filtered ---
    if (typeFilter) {
      renderGroupedByProject(filtered, cardContainer, tableBody, tableWrap);
      if (filtered.length === 0) {
        emptyState.style.display = '';
        summaryText.textContent = '';
      } else {
        emptyState.style.display = 'none';
        summaryText.textContent = 'Showing ' + filtered.length + ' ' + (TYPE_MAP[typeFilter] || typeFilter).toLowerCase() + (filtered.length === 1 ? ' report' : ' reports');
      }
      return;
    }

    // Empty state
    if (filtered.length === 0) {
      tableBody.innerHTML = '';
      cardContainer.innerHTML = '';
      emptyState.style.display = '';
      summaryText.textContent = '';
      return;
    }

    emptyState.style.display = 'none';
    summaryText.textContent = 'Showing ' + filtered.length + ' of ' + allReports.length + ' reports';

    // rowKey() is defined at outer scope — shared with renderGroupedByProject

    // Show the flat containers (hidden by grouped render)
    if (tableWrap) tableWrap.style.display = '';
    cardsWrap.style.display = '';

    // Desktop table
    var rowsHtml = '';
    filtered.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.type] || r.type || '—';
      var badgeClass = r.status === 'draft' ? 'badge-draft' : r.status === 'submitted' ? 'badge-submitted' : 'badge-completed';
      var badgeText = r.status === 'draft' ? 'Draft' : r.status === 'submitted' ? 'Submitted' : 'Completed';
      var linkAttr = r.link ? ' data-link="' + r.link + '"' : '';
      var editHtml = (r.source === 'cloud' && r.link) ? ' <span class="edit-indicator">✎ Edit</span>' : '';
      var key = rowKey(r);
      var deleteBtn = key
        ? '<button class="delete-btn" data-del-key="' + key + '" title="Delete this report">&times;</button>'
        : '';
      rowsHtml += '<tr' + linkAttr + '>' +
        '<td>' + fmtDate(r.date) + '</td>' +
        '<td>' + typeLabel + '</td>' +
        '<td>' + (r.customer || '—') + '</td>' +
        '<td>' + (r.projectName || '—') + '</td>' +
        '<td>' + (r.projectAddress || '—') + '</td>' +
        '<td>' + (r.techName || '—') + '</td>' +
        '<td><span class="badge ' + badgeClass + '">' + badgeText + '</span>' + editHtml + '</td>' +
        '<td>' + deleteBtn + '</td>' +
        '</tr>';
    });
    tableBody.innerHTML = rowsHtml;

    // Mobile cards
    var cardsHtml = '';
    filtered.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.type] || r.type || '—';
      var badgeClass = r.status === 'draft' ? 'badge-draft' : r.status === 'submitted' ? 'badge-submitted' : 'badge-completed';
      var badgeText = r.status === 'draft' ? 'Draft' : r.status === 'submitted' ? 'Submitted' : 'Completed';
      var tag = r.link ? 'a' : 'div';
      var hrefAttr = r.link ? ' href="' + r.link + '"' : '';
      var cardEditHtml = (r.source === 'cloud' && r.link) ? '<span class="edit-indicator">✎ Edit</span>' : '';
      var key = rowKey(r);
      var cardDeleteHtml = key
        ? '<button class="delete-btn" data-del-key="' + key + '" title="Delete">&times;</button>'
        : '';
      cardsHtml += '<' + tag + ' class="history-card"' + hrefAttr + '>' +
        '<div class="history-card-top">' +
          '<span class="history-card-type">' + typeLabel + '</span>' +
          '<span style="display:inline-flex;gap:6px;align-items:center">' +
            '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
            cardDeleteHtml +
          '</span>' +
        '</div>' +
        '<div class="history-card-date">' + fmtDate(r.date) + cardEditHtml + '</div>' +
        '<div class="history-card-row">Customer: <span>' + (r.customer || '—') + '</span></div>' +
        (r.projectName ? '<div class="history-card-row">Project: <span>' + r.projectName + '</span></div>' : '') +
        (r.projectAddress ? '<div class="history-card-row">Address: <span>' + r.projectAddress + '</span></div>' : '') +
        '<div class="history-card-row">Tech: <span>' + (r.techName || '—') + '</span></div>' +
        '</' + tag + '>';
    });
    cardContainer.innerHTML = cardsHtml;
  }

  // --- Render filtered reports grouped by project (used when ?type=X) ---
  function renderGroupedByProject(filtered, cardContainer, tableBody, tableWrap) {
    // Clear the flat containers — we build our own grouped layout below
    tableBody.innerHTML = '';
    cardContainer.innerHTML = '';

    // Remove old groups
    var existingGroups = document.querySelectorAll('.project-group');
    existingGroups.forEach(function(g) { g.remove(); });

    if (!filtered.length) return;

    // Hide the flat table + cards while in grouped mode
    if (tableWrap) tableWrap.style.display = 'none';
    cardContainer.style.display = 'none';

    // Build groups keyed by project name (fallback: "No Project")
    var groups = {};
    var groupOrder = [];
    filtered.forEach(function(r) {
      var key = (r.projectName && r.projectName.trim()) ? r.projectName.trim() : '__no_project__';
      if (!groups[key]) {
        groups[key] = {
          name: key === '__no_project__' ? 'No Project' : key,
          address: r.projectAddress || '',
          reports: [],
          isNoProject: key === '__no_project__'
        };
        groupOrder.push(key);
      }
      groups[key].reports.push(r);
      // Prefer any non-empty address for the group subtitle
      if (r.projectAddress && !groups[key].address) groups[key].address = r.projectAddress;
    });

    // Sort groups: real projects first (alphabetically), "No Project" last
    groupOrder.sort(function(a, b) {
      if (a === '__no_project__') return 1;
      if (b === '__no_project__') return -1;
      return groups[a].name.localeCompare(groups[b].name);
    });

    // Insert each group after the summary text
    var after = document.getElementById('summaryText');
    var anchor = after;
    groupOrder.forEach(function(gk) {
      var g = groups[gk];
      var groupEl = document.createElement('div');
      groupEl.className = 'project-group';
      groupEl.innerHTML =
        '<div class="project-group-header" data-group-key="' + escapeAttr(gk) + '">' +
          '<span class="project-group-chevron">▼</span>' +
          '<span class="project-group-icon">' + (g.isNoProject ? '📋' : '📁') + '</span>' +
          '<span class="project-group-name">' + escapeHtml(g.name) +
            (g.address ? '<span class="project-group-subtitle">' + escapeHtml(g.address) + '</span>' : '') +
          '</span>' +
          '<span class="project-group-count">' + g.reports.length + '</span>' +
        '</div>' +
        '<div class="project-group-body">' +
          '<div class="history-table"><table class="table-clean">' +
            '<thead><tr>' +
              '<th>Date</th><th>Type</th><th>Customer</th><th>Address</th><th>Technician</th><th>Status</th>' +
              '<th style="width:40px"></th>' +
            '</tr></thead>' +
            '<tbody>' + buildRowsHtml(g.reports) + '</tbody>' +
          '</table></div>' +
          '<div class="history-cards">' + buildCardsHtml(g.reports) + '</div>' +
        '</div>';
      // Insert after the last anchor
      if (anchor && anchor.parentNode) {
        anchor.parentNode.insertBefore(groupEl, anchor.nextSibling);
        anchor = groupEl;
      } else {
        document.querySelector('.history-wrap').appendChild(groupEl);
      }
    });

    // Wire up collapse toggles
    document.querySelectorAll('.project-group-header').forEach(function(h) {
      h.addEventListener('click', function() {
        h.classList.toggle('collapsed');
      });
    });

    // Wire up delete buttons + row click inside groups (delegated)
    document.querySelectorAll('.project-group-body').forEach(function(gb) {
      gb.addEventListener('click', function(e) {
        var delBtn = e.target.closest('.delete-btn');
        if (delBtn) {
          e.preventDefault();
          e.stopPropagation();
          var key = delBtn.getAttribute('data-del-key');
          deleteReportByKey(key, findReportByKey(key));
          return;
        }
        var row = e.target.closest('tr[data-link]');
        if (row) {
          window.location.href = row.getAttribute('data-link');
        }
      });
    });
  }

  // Shared row-html builder used by flat + grouped renders
  function buildRowsHtml(rows) {
    var html = '';
    rows.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.type] || r.type || '—';
      var badgeClass = r.status === 'draft' ? 'badge-draft' : r.status === 'submitted' ? 'badge-submitted' : 'badge-completed';
      var badgeText = r.status === 'draft' ? 'Draft' : r.status === 'submitted' ? 'Submitted' : 'Completed';
      var linkAttr = r.link ? ' data-link="' + r.link + '"' : '';
      var editHtml = (r.source === 'cloud' && r.link) ? ' <span class="edit-indicator">✎ Edit</span>' : '';
      var k = rowKey(r);
      var del = k ? '<button class="delete-btn" data-del-key="' + k + '" title="Delete">&times;</button>' : '';
      html += '<tr' + linkAttr + '>' +
        '<td>' + fmtDate(r.date) + '</td>' +
        '<td>' + typeLabel + '</td>' +
        '<td>' + (r.customer || '—') + '</td>' +
        '<td>' + (r.projectAddress || '—') + '</td>' +
        '<td>' + (r.techName || '—') + '</td>' +
        '<td><span class="badge ' + badgeClass + '">' + badgeText + '</span>' + editHtml + '</td>' +
        '<td>' + del + '</td>' +
        '</tr>';
    });
    return html;
  }

  function buildCardsHtml(rows) {
    var html = '';
    rows.forEach(function(r) {
      var typeLabel = TYPE_MAP[r.type] || r.type || '—';
      var badgeClass = r.status === 'draft' ? 'badge-draft' : r.status === 'submitted' ? 'badge-submitted' : 'badge-completed';
      var badgeText = r.status === 'draft' ? 'Draft' : r.status === 'submitted' ? 'Submitted' : 'Completed';
      var tag = r.link ? 'a' : 'div';
      var hrefAttr = r.link ? ' href="' + r.link + '"' : '';
      var cardEditHtml = (r.source === 'cloud' && r.link) ? '<span class="edit-indicator">✎ Edit</span>' : '';
      var k = rowKey(r);
      var del = k ? '<button class="delete-btn" data-del-key="' + k + '" title="Delete">&times;</button>' : '';
      html += '<' + tag + ' class="history-card"' + hrefAttr + '>' +
        '<div class="history-card-top">' +
          '<span class="history-card-type">' + typeLabel + '</span>' +
          '<span style="display:inline-flex;gap:6px;align-items:center">' +
            '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
            del +
          '</span>' +
        '</div>' +
        '<div class="history-card-date">' + fmtDate(r.date) + cardEditHtml + '</div>' +
        '<div class="history-card-row">Customer: <span>' + (r.customer || '—') + '</span></div>' +
        (r.projectAddress ? '<div class="history-card-row">Address: <span>' + r.projectAddress + '</span></div>' : '') +
        '<div class="history-card-row">Tech: <span>' + (r.techName || '—') + '</span></div>' +
        '</' + tag + '>';
    });
    return html;
  }

  // rowKey is used by both flat and grouped renders, delete handler, etc.
  function rowKey(r) {
    if (r.cloudId) return 'cloud:' + r.cloudId;
    if (r.source === 'local' && r.link) {
      var m = (r.link.match(/[?&]draft=([^&]+)/) || []);
      if (m[1]) return 'local:' + decodeURIComponent(m[1]);
    }
    return '';
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escapeAttr(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // --- Delete a report (local draft or cloud) ---
  async function deleteReportByKey(key, row) {
    if (!key) return;

    var isLocal = key.indexOf('local:') === 0;
    var id = key.replace(/^(local|cloud):/, '');

    // Figure out the label for the confirmation prompt
    var label = row ? [
      TYPE_MAP[row.type] || row.type || 'Report',
      row.customer ? ' for ' + row.customer : '',
      row.date ? ' (' + fmtDate(row.date) + ')' : ''
    ].join('') : 'this report';

    if (!confirm('Delete ' + label + '?\n\nThis cannot be undone.')) return;

    try {
      if (isLocal) {
        // Remove from nw_drafts list + the companion nw_draft_<id> payload
        var drafts = [];
        try { drafts = JSON.parse(localStorage.getItem('nw_drafts') || '[]'); } catch(e) {}
        drafts = drafts.filter(function(d) { return d.id !== id; });
        localStorage.setItem('nw_drafts', JSON.stringify(drafts));
        localStorage.removeItem('nw_draft_' + id);
      } else {
        // Cloud — call Supabase
        if (typeof deleteCloudReport !== 'function') throw new Error('deleteCloudReport not available');
        var res = await deleteCloudReport(id);
        if (res && res.error) throw res.error;
        // Purge from cache so the refresh doesn't bring it back instantly
        try {
          var cached = JSON.parse(localStorage.getItem(CLOUD_CACHE_KEY) || 'null');
          if (cached && Array.isArray(cached.rows)) {
            cached.rows = cached.rows.filter(function(r) { return r.id !== id; });
            localStorage.setItem(CLOUD_CACHE_KEY, JSON.stringify(cached));
          }
        } catch(e) {}
      }

      // Remove from the in-memory list + rerender immediately
      allReports = allReports.filter(function(r) {
        var rk = r.cloudId
          ? 'cloud:' + r.cloudId
          : (r.source === 'local' && r.link)
            ? 'local:' + decodeURIComponent((r.link.match(/[?&]draft=([^&]+)/) || [])[1] || '')
            : '';
        return rk !== key;
      });
      render();
    } catch (err) {
      console.error('[history] delete failed:', err);
      alert('Delete failed:\n\n' + (err && err.message ? err.message : err));
    }
  }

  // Helper: find the allReports entry that matches a given key
  function findReportByKey(key) {
    for (var i = 0; i < allReports.length; i++) {
      var r = allReports[i];
      var rk = r.cloudId
        ? 'cloud:' + r.cloudId
        : (r.source === 'local' && r.link)
          ? 'local:' + decodeURIComponent((r.link.match(/[?&]draft=([^&]+)/) || [])[1] || '')
          : '';
      if (rk === key) return r;
    }
    return null;
  }

  // --- Row click handler (desktop) ---
  document.getElementById('tableBody').addEventListener('click', function(e) {
    // Delete button first — takes priority over row navigation
    var delBtn = e.target.closest('.delete-btn');
    if (delBtn) {
      e.preventDefault();
      e.stopPropagation();
      var key = delBtn.getAttribute('data-del-key');
      deleteReportByKey(key, findReportByKey(key));
      return;
    }
    var row = e.target.closest('tr[data-link]');
    if (row) {
      window.location.href = row.getAttribute('data-link');
    }
  });

  // --- Delete handler for mobile cards (they use <a> so we need preventDefault too) ---
  document.getElementById('cardContainer').addEventListener('click', function(e) {
    var delBtn = e.target.closest('.delete-btn');
    if (delBtn) {
      e.preventDefault();
      e.stopPropagation();
      var key = delBtn.getAttribute('data-del-key');
      deleteReportByKey(key, findReportByKey(key));
    }
  });

  // --- Tab click ---
  document.getElementById('statusTabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    var tabs = document.querySelectorAll('#statusTabs .tab');
    tabs.forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    activeFilter = tab.getAttribute('data-filter');
    render();
  });

  // --- Search (debounced 300ms) ---
  document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      searchTerm = e.target.value.trim();
      render();
    }, 300);
  });

  // --- Profile circle ---
  function loadProfile() {
    try {
      var profile = JSON.parse(localStorage.getItem('nw_tech_profile') || '{}');
      var name = profile.name || profile.techName || '';
      if (name) {
        var parts = name.trim().split(/\s+/);
        var initials = parts.length >= 2
          ? parts[0][0] + parts[parts.length - 1][0]
          : name.substring(0, 2);
        document.getElementById('profileCircle').textContent = initials.toUpperCase();
      }
    } catch(e) {}
  }

  // --- Init ---
  loadProfile();
  loadReports();
  render();
  // Fetch cloud reports in background and merge
  loadCloudReports();
})();
</script>
