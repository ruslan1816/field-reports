<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NW Field">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0696D7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js?v=52"></script>
  <script src="auth.js?v=52"></script>
  <title>Northern Wolves AC — Field Reports</title>
  <style>
    /* ===== PREMIUM DASHBOARD STYLES ===== */

    :root {
      --nw-blue: #0696D7;
      --nw-blue-dark: #0578ab;
      --nw-navy: #0f172a;
      --nw-slate: #1e293b;
      --nw-gray: #64748b;
      --nw-light: #f8fafc;
      --nw-border: rgba(255,255,255,0.08);
      --card-bg: rgba(255,255,255,0.95);
      --card-border: rgba(226,232,240,0.6);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--nw-light) !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      margin: 0 !important;
      min-height: 100vh !important;
      color: var(--nw-slate) !important;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .dash-header {
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 40%, #0ea5e9 100%);
      padding: 0;
      display: flex;
      flex-direction: column;
      border-bottom: none;
      position: relative;
      z-index: 100;
    }
    .dash-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .dash-header::after {
      content: '';
      position: absolute;
      bottom: -60%;
      left: -10%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 0;
      position: relative;
      z-index: 2;
    }
    .dash-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dash-header-logo {
      height: 36px;
      width: auto;
    }
    .profile-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(6,150,215,0.25);
      border: 2px solid rgba(6,150,215,0.4);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .profile-circle:active {
      transform: scale(0.95);
    }
    .profile-circle.empty {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }
    .profile-circle.empty svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* Hero greeting */
    .hero-greeting {
      padding: 20px 20px 24px;
      position: relative;
      z-index: 2;
    }
    .hero-greeting h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin: 0 0 4px;
      letter-spacing: -0.3px;
    }
    .hero-greeting p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin: 0;
      font-weight: 500;
    }


    /* Install Banner */
    .install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      align-items: center;
      gap: 12px;
    }
    .install-banner.visible { display: flex; }
    .install-banner-icon { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
    .install-banner-text { flex: 1; min-width: 0; }
    .install-banner-title { font-size: 14px; font-weight: 700; color: #1a2332; }
    .install-banner-desc { font-size: 12px; color: #64748b; margin-top: 2px; }
    .install-banner .btn-install {
      background: var(--nw-blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .install-banner .btn-install:active { opacity: 0.85; }
    .install-banner .btn-dismiss {
      background: none; border: none; color: #94a3b8;
      font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; flex-shrink: 0;
    }

    /* Dispatch section */
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin: 24px auto 12px;
      max-width: 600px;
    }
    .section-title h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--nw-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }
    .section-title a {
      font-size: 13px;
      color: var(--nw-blue);
      text-decoration: none;
      font-weight: 600;
    }

    /* Activity Feed */
    .activity-feed {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid var(--card-border);
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .activity-item:active {
      transform: scale(0.98);
    }
    .activity-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: #f1f5f9; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .activity-info { flex: 1; min-width: 0; }
    .activity-title { font-size: 14px; font-weight: 600; color: var(--nw-slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-customer { font-size: 12px; color: var(--nw-gray); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-meta { text-align: right; flex-shrink: 0; }
    .activity-time { font-size: 11px; color: #94a3b8; white-space: nowrap; }
    .activity-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .activity-badge.draft { background: #fef3c7; color: #b45309; }
    .activity-badge.completed { background: #d1fae5; color: #047857; }
    .activity-item-wrap { position: relative; }
    .delete-draft-btn {
      position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
      border: none; background: #fee2e2; color: #991b1b; border-radius: 50%;
      font-size: 16px; line-height: 1; cursor: pointer; display: flex;
      align-items: center; justify-content: center; z-index: 2; opacity: 0.7;
    }
    .delete-draft-btn:hover { opacity: 1; background: #fecaca; }
    .activity-empty {
      text-align: center; padding: 32px 16px; color: #94a3b8;
      font-size: 14px; background: #fff; border-radius: 14px; border: 1px solid var(--card-border);
    }
    .activity-empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* ===== CARD GRID ===== */
    .grid-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }
    .grid-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--nw-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px;
    }
    .grid-label:first-child {
      margin-top: 20px;
    }
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 380px) {
      .report-grid { grid-template-columns: 1fr; }
    }

    .report-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--card-border);
      text-decoration: none;
      color: inherit;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .report-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--card-accent, var(--nw-blue));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .report-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-md);
    }
    .report-card:active::before {
      opacity: 1;
    }
    /* Hover for desktop */
    @media (hover: hover) {
      .report-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: transparent;
      }
      .report-card:hover::before {
        opacity: 1;
      }
    }

    .report-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: var(--icon-bg, #f1f5f9);
    }
    .report-card-info {
      flex: 1;
      min-width: 0;
    }
    .report-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--nw-slate);
      letter-spacing: -0.1px;
    }
    .report-card-desc {
      font-size: 11px;
      color: var(--nw-gray);
      margin-top: 3px;
      line-height: 1.3;
    }
    .report-card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 2px 6px rgba(245,158,11,0.35);
    }
    .report-card-arrow {
      color: #cbd5e1;
      font-size: 16px;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }
    @media (hover: hover) {
      .report-card:hover .report-card-arrow {
        color: var(--nw-blue);
        transform: translateX(2px);
      }
    }

    /* Entrance animations */
    .report-card {
      opacity: 0;
      transform: translateY(12px);
      animation: cardIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Staggered delays per card */
    .report-card:nth-child(1) { animation-delay: 0.03s; }
    .report-card:nth-child(2) { animation-delay: 0.06s; }
    .report-card:nth-child(3) { animation-delay: 0.09s; }
    .report-card:nth-child(4) { animation-delay: 0.12s; }
    .report-card:nth-child(5) { animation-delay: 0.15s; }
    .report-card:nth-child(6) { animation-delay: 0.18s; }
    .report-card:nth-child(7) { animation-delay: 0.21s; }
    .report-card:nth-child(8) { animation-delay: 0.24s; }
    .report-card:nth-child(9) { animation-delay: 0.27s; }
    .report-card:nth-child(10) { animation-delay: 0.30s; }
    .report-card:nth-child(11) { animation-delay: 0.33s; }
    .report-card:nth-child(12) { animation-delay: 0.36s; }
    .report-card:nth-child(13) { animation-delay: 0.39s; }
    .report-card:nth-child(14) { animation-delay: 0.42s; }

    /* ===== SUPPORT CARD (full-width accent) ===== */
    .support-card-wrap {
      margin-top: 12px;
    }
    .support-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 40%, #0ea5e9 100%);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: all 0.25s;
    }
    .support-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .support-card:active {
      transform: scale(0.98);
    }
    .support-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(6,150,215,0.2);
      border: 1px solid rgba(6,150,215,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .support-card-info {
      flex: 1;
      position: relative;
      z-index: 1;
    }
    .support-card-title {
      font-size: 15px;
      font-weight: 700;
    }
    .support-card-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }
    .support-card-arrow {
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    /* Footer */
    .dash-footer {
      text-align: center;
      padding: 32px 16px 44px;
      color: #94a3b8;
      font-size: 11px;
      letter-spacing: 0.3px;
    }

    /* Profile Dropdown */
    .profile-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      padding: 20px;
      min-width: 240px;
      z-index: 500;
      border: 1px solid rgba(226,232,240,0.6);
    }
    .profile-dropdown.show { display: block; }
    .profile-dd-name { font-size: 16px; font-weight: 700; color: var(--nw-slate); }
    .profile-dd-role {
      font-size: 11px; font-weight: 700; color: var(--nw-blue);
      text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px;
      background: rgba(6,150,215,0.08); display: inline-block;
      padding: 2px 8px; border-radius: 6px;
    }
    .profile-dd-email { font-size: 12px; color: #94a3b8; margin-top: 6px; }
    .profile-dd-divider { height: 1px; background: #f1f5f9; margin: 14px 0; }
    .profile-dd-logout {
      width: 100%; padding: 10px; background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .profile-dd-logout:active { background: #fee2e2; }
  </style>
</head>
<body>

  <!-- Header with Hero -->
  <header class="dash-header">
    <div class="header-top">
      <div class="dash-header-left">
        <img class="dash-header-logo" src="logo-header.png" alt="Northern Wolves AC">
      </div>
      <div style="position:relative">
        <div class="profile-circle" id="profileCircle" title="Profile" onclick="document.getElementById('profileDropdown').classList.toggle('show')">?</div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="profile-dd-name" id="profileName">Loading...</div>
          <div class="profile-dd-role" id="profileRole">tech</div>
          <div class="profile-dd-email" id="profileEmail"></div>
          <div class="profile-dd-divider"></div>
          <button class="profile-dd-logout" onclick="logout()">Log Out</button>
        </div>
      </div>
    </div>
    <div class="hero-greeting">
      <h1 id="heroGreeting">Good morning</h1>
      <p id="heroDate"></p>
    </div>
  </header>

  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <img class="install-banner-icon" src="icon-192.png" alt="NW">
    <div class="install-banner-text">
      <div class="install-banner-title">Install Northern Wolves Field Reports</div>
      <div class="install-banner-desc">Quick access from your home screen</div>
    </div>
    <button class="btn-install" id="installBtn">Install</button>
    <button class="btn-dismiss" id="dismissInstall" aria-label="Dismiss">&times;</button>
  </div>

  <!-- My Dispatches -->
  <div class="section-title" id="dispatchSection" style="display:none">
    <h2>My Jobs</h2>
    <a href="dispatch.html">View All &rarr;</a>
  </div>
  <div class="activity-feed" id="dispatchFeed"></div>

  <!-- Card Grids -->
  <div class="grid-container">
    <div class="grid-label">Reports</div>
    <div class="report-grid" id="reportGrid"></div>

    <div class="grid-label">Tools</div>
    <div class="report-grid" id="toolsGrid"></div>

    <div class="support-card-wrap" id="supportWrap"></div>
  </div>

  <!-- Footer -->
  <div class="dash-footer">Northern Wolves Air Conditioning &mdash; NY &amp; NJ</div>

<script>
(async function() {
  // ===== AUTH GUARD =====
  try { await requireAuth(); } catch(e) { return; }
  await initAuthUI();

  // Close profile dropdown on outside click
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('profileDropdown');
    var circle = document.getElementById('profileCircle');
    if (dd && !dd.contains(e.target) && e.target !== circle) {
      dd.classList.remove('show');
    }
  });
  // ===== CONSTANTS =====
  var DRAFTS_KEY = 'nw_drafts';
  var HISTORY_KEY = 'nw_history';
  var PROFILE_KEY = 'nw_tech_profile';

  // ===== HELPER FUNCTIONS =====

  function getDrafts() {
    try { return JSON.parse(localStorage.getItem(DRAFTS_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function getProfile() {
    try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); }
    catch(e) { return null; }
  }

  function relativeTime(isoString) {
    if (!isoString) return '';
    var now = Date.now();
    var then = new Date(isoString).getTime();
    var diffMs = now - then;
    if (isNaN(diffMs) || diffMs < 0) return '';

    var seconds = Math.floor(diffMs / 1000);
    var minutes = Math.floor(seconds / 60);
    var hours = Math.floor(minutes / 60);
    var days = Math.floor(hours / 24);

    if (seconds < 60) return 'Just now';
    if (minutes < 60) return minutes + 'm ago';
    if (hours < 24) return hours + 'h ago';
    if (days === 1) return 'Yesterday';
    if (days < 7) return days + 'd ago';

    var d = new Date(isoString);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
  }

  function getReportTypeIcon(type) {
    var icons = {
      'service-call': '\uD83D\uDD27',
      'startup': '\uD83D\uDE80',
      'site-survey': '\uD83D\uDCCB',
      'pm-checklist': '\u2705',
      'work-order': '\uD83D\uDCDD',
      'change-order': '\uD83D\uDCCB',
      'rfi': '\u2753'
    };
    return icons[type] || '\uD83D\uDCCB';
  }

  function getReportTypeLabel(type) {
    var labels = {
      'service-call': 'Service Call',
      'startup': 'Start-Up Report',
      'site-survey': 'Site Survey',
      'pm-checklist': 'Maintenance',
      'work-order': 'Work Order',
      'change-order': 'Change Order',
      'rfi': 'RFI'
    };
    return labels[type] || type || 'Report';
  }

  function getFormPage(type) {
    var pages = {
      'service-call': 'service-call-report.html',
      'startup': 'startup-report.html',
      'site-survey': 'site-survey-report.html',
      'pm-checklist': 'pm-checklist.html',
      'work-order': 'work-order.html',
      'change-order': 'change-order.html',
      'rfi': 'rfi.html'
    };
    return pages[type] || '#';
  }

  function isThisWeek(isoString) {
    if (!isoString) return false;
    var d = new Date(isoString);
    var now = new Date();
    var startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - now.getDay());
    startOfWeek.setHours(0, 0, 0, 0);
    var endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 7);
    return d >= startOfWeek && d < endOfWeek;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // ===== HERO GREETING =====
  function renderHero() {
    var hour = new Date().getHours();
    var greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    var profileName = document.getElementById('profileName').textContent || '';
    var firstName = '';
    if (profileName && profileName !== 'Loading...') {
      firstName = profileName.split(' ')[0];
    }
    document.getElementById('heroGreeting').textContent = firstName ? greeting + ', ' + firstName : greeting;

    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var now = new Date();
    document.getElementById('heroDate').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  }


  // ===== ACTIVITY FEED =====
  function renderActivity() {
    var drafts = getDrafts();
    var history = getHistory();
    var container = document.getElementById('activityFeed');

    var items = [];
    drafts.forEach(function(d) {
      items.push({
        id: d.id,
        type: d.type,
        title: d.title || getReportTypeLabel(d.type),
        customer: d.customer || '',
        time: d.lastModified,
        status: 'draft',
        formPage: d.formPage || getFormPage(d.type)
      });
    });
    history.forEach(function(h) {
      items.push({
        id: h.id,
        type: h.type,
        title: h.title || getReportTypeLabel(h.type),
        customer: h.customer || '',
        time: h.completedAt,
        status: 'completed',
        formPage: null
      });
    });

    items.sort(function(a, b) {
      var tA = a.time ? new Date(a.time).getTime() : 0;
      var tB = b.time ? new Date(b.time).getTime() : 0;
      return tB - tA;
    });

    var recent = items.slice(0, 5);

    if (recent.length === 0) {
      container.innerHTML =
        '<div class="activity-empty">' +
          '<div class="activity-empty-icon">\uD83D\uDCCB</div>' +
          'No reports yet \u2014 tap a form below to get started' +
        '</div>';
      return;
    }

    var html = '';
    recent.forEach(function(item) {
      var href = '';
      if (item.status === 'draft' && item.formPage) {
        href = item.formPage + '?draft=' + encodeURIComponent(item.id);
      } else if (item.status === 'draft') {
        href = getFormPage(item.type) + '?draft=' + encodeURIComponent(item.id);
      } else {
        href = 'history.html';
      }

      var deleteBtn = item.status === 'draft'
        ? '<button class="delete-draft-btn" data-draft-id="' + escapeHtml(item.id) + '" title="Delete draft">&times;</button>'
        : '';

      html +=
        '<div class="activity-item-wrap">' +
        '<a class="activity-item" href="' + escapeHtml(href) + '">' +
          '<div class="activity-icon">' + getReportTypeIcon(item.type) + '</div>' +
          '<div class="activity-info">' +
            '<div class="activity-title">' + escapeHtml(item.title) + '</div>' +
            '<div class="activity-customer">' + escapeHtml(item.customer || getReportTypeLabel(item.type)) + '</div>' +
          '</div>' +
          '<div class="activity-meta">' +
            '<div class="activity-time">' + relativeTime(item.time) + '</div>' +
            '<div class="activity-badge ' + item.status + '">' + item.status + '</div>' +
          '</div>' +
        '</a>' +
        deleteBtn +
        '</div>';
    });

    container.innerHTML = html;

    // Attach delete handlers
    container.querySelectorAll('.delete-draft-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var draftId = btn.getAttribute('data-draft-id');
        if (confirm('Delete this draft?')) {
          deleteDraft(draftId);
          renderStats();
          renderActivity();
        }
      });
    });
  }

  function deleteDraft(draftId) {
    var drafts = getDrafts();
    var filtered = drafts.filter(function(d) { return d.id !== draftId; });
    localStorage.setItem(DRAFTS_KEY, JSON.stringify(filtered));
    // Also remove saved form data
    localStorage.removeItem('nw_draft_' + draftId);
  }

  // ===== REPORT GRID =====
  function renderReportGrid() {
    var drafts = getDrafts();

    // Report forms — each card opens a list view (history.html?type=X)
    // with a big "+ New" button at the top and project folder grouping.
    var reportTypes = [
      { type: 'service-call', icon: '\uD83D\uDD27', title: 'Service Call', desc: 'Diagnosis, readings, parts, labor', page: 'history.html?type=service-call', accent: '#0696D7', iconBg: '#e0f2fe' },
      { type: 'startup', icon: '\uD83D\uDE80', title: 'Start-Up', desc: 'Cooling & heating commissioning', page: 'history.html?type=startup', accent: '#8b5cf6', iconBg: '#ede9fe' },
      { type: 'site-survey', icon: '\uD83D\uDCCB', title: 'Site Survey', desc: 'Equipment inventory & conditions', page: 'history.html?type=site-survey', accent: '#10b981', iconBg: '#d1fae5' },
      { type: 'pm-checklist', icon: '\u2705', title: 'Maintenance', desc: 'PM checklist by equipment type', page: 'history.html?type=pm-checklist', accent: '#f59e0b', iconBg: '#fef3c7' },
      { type: 'work-order', icon: '\uD83D\uDCDD', title: 'Work Order', desc: 'Parts, labor, cost tracking', page: 'history.html?type=work-order', accent: '#0696D7', iconBg: '#e0f2fe' }
    ];

    // Tool / management cards
    var toolTypes = [
      { type: 'schedule', icon: '\uD83D\uDCC5', title: 'Schedule', desc: '2-3 week look-ahead, all crews', page: 'schedule.html', accent: '#0696D7', iconBg: '#e0f2fe' },
      { type: 'dispatch', icon: '\uD83D\uDCE8', title: 'Dispatch', desc: 'Single-job emergency tickets', page: 'dispatch.html', accent: '#ef4444', iconBg: '#fee2e2' },
      { type: 'customers', icon: '\uD83C\uDFE2', title: 'Customers', desc: 'Shared customer database', page: 'customers.html', accent: '#0696D7', iconBg: '#e0f2fe' },
      { type: 'equipment', icon: '\u2699\uFE0F', title: 'Equipment', desc: 'Track units, warranties, service', page: 'equipment.html', accent: '#64748b', iconBg: '#f1f5f9' },
      { type: 'projects', icon: '\uD83D\uDCC1', title: 'Projects', desc: 'Shared docs & drawings', page: 'projects.html', accent: '#f59e0b', iconBg: '#fef3c7' },
      { type: 'management', icon: '\uD83D\uDCCA', title: 'Management', desc: 'All reports & status', page: 'management.html', accent: '#8b5cf6', iconBg: '#ede9fe' },
      { type: 'history', icon: '\uD83D\uDCC3', title: 'Activity', desc: 'Drafts & completed reports', page: 'history.html', accent: '#10b981', iconBg: '#d1fae5' }
    ];

    var draftCounts = {};
    drafts.forEach(function(d) {
      if (d.type) {
        draftCounts[d.type] = (draftCounts[d.type] || 0) + 1;
      }
    });

    function buildCards(items) {
      var html = '';
      items.forEach(function(r) {
        var count = draftCounts[r.type] || 0;
        var badgeHtml = count > 0
          ? '<div class="report-card-badge">' + count + '</div>'
          : '';
        html +=
          '<a class="report-card" href="' + r.page + '" style="--card-accent:' + r.accent + ';--icon-bg:' + r.iconBg + '">' +
            badgeHtml +
            '<div class="report-card-icon">' + r.icon + '</div>' +
            '<div class="report-card-info">' +
              '<div class="report-card-title">' + r.title + '</div>' +
              '<div class="report-card-desc">' + r.desc + '</div>' +
            '</div>' +
            '<span class="report-card-arrow">\u203A</span>' +
          '</a>';
      });
      return html;
    }

    document.getElementById('reportGrid').innerHTML = buildCards(reportTypes);
    document.getElementById('toolsGrid').innerHTML = buildCards(toolTypes);

    // Support card (featured)
    document.getElementById('supportWrap').innerHTML =
      '<a class="support-card" href="support.html">' +
        '<div class="support-card-icon">\uD83E\uDD16</div>' +
        '<div class="support-card-info">' +
          '<div class="support-card-title">AI Support</div>' +
          '<div class="support-card-desc">HVAC troubleshooting & app help \u2014 available 24/7</div>' +
        '</div>' +
        '<span class="support-card-arrow">\u203A</span>' +
      '</a>';
  }

  // ===== PROFILE (handled by auth.js) =====

  // ===== INSTALL PROMPT =====
  var deferredPrompt = null;
  var installBanner = document.getElementById('installBanner');
  var installBtn = document.getElementById('installBtn');
  var dismissBtn = document.getElementById('dismissInstall');

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('nw_install_dismissed')) {
      installBanner.classList.add('visible');
    }
  });

  installBtn.addEventListener('click', function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        deferredPrompt = null;
        installBanner.classList.remove('visible');
      });
    }
  });

  dismissBtn.addEventListener('click', function() {
    installBanner.classList.remove('visible');
    localStorage.setItem('nw_install_dismissed', '1');
  });

  // iOS install detection
  function checkiOSInstall() {
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isStandalone = window.navigator.standalone === true;
    if (isIOS && !isStandalone && !deferredPrompt && !localStorage.getItem('nw_install_dismissed')) {
      var banner = document.getElementById('installBanner');
      var btn = document.getElementById('installBtn');
      btn.textContent = 'How to Install';
      btn.addEventListener('click', function iosHandler() {
        btn.removeEventListener('click', iosHandler);
        alert('To install: tap the Share button in Safari, then tap "Add to Home Screen".');
        banner.classList.remove('visible');
        localStorage.setItem('nw_install_dismissed', '1');
      }, { once: true });
      banner.classList.add('visible');
    }
  }

  // ===== DISPATCH INBOX =====
  async function renderDispatches() {
    if (typeof getDispatches !== 'function' || typeof getCurrentUser !== 'function') return;
    try {
      var userRes = await getCurrentUser();
      if (!userRes.data) return;
      var res = await getDispatches({ assigned_to: userRes.data.id, not_status: 'completed', limit: 5 });
      var jobs = (res.data || []).filter(function(d) { return d.status !== 'cancelled'; });
      if (jobs.length === 0) return;

      document.getElementById('dispatchSection').style.display = 'flex';
      var container = document.getElementById('dispatchFeed');
      var priorityIcons = { critical: '\uD83D\uDD34', high: '\uD83D\uDFE0', standard: '\uD83D\uDD35', low: '\u26AA' };
      var html = '';
      jobs.forEach(function(d) {
        html += '<a class="activity-item" href="dispatch.html">' +
          '<div class="activity-icon">' + (priorityIcons[d.priority] || '\uD83D\uDD35') + '</div>' +
          '<div class="activity-info">' +
            '<div class="activity-title">' + escapeHtml(d.title) + '</div>' +
            '<div class="activity-customer">' + escapeHtml(d.customer_name || d.address || 'No location') + '</div>' +
          '</div>' +
          '<div class="activity-meta">' +
            (d.scheduled_date ? '<div class="activity-time">' + d.scheduled_date.substring(5).replace('-','/') + '</div>' : '') +
            '<div class="activity-badge ' + (d.status === 'pending' ? 'draft' : 'completed') + '">' + (d.status || 'pending') + '</div>' +
          '</div>' +
        '</a>';
      });
      container.innerHTML = html;
    } catch(e) {
      console.error('[dashboard] dispatch load error:', e);
    }
  }

  // ===== INIT =====
  renderHero();
  renderReportGrid();
  renderDispatches();

  // Hide management card for techs
  getAuthProfile().then(function(profile) {
    if (profile && profile.role === 'tech') {
      var mgmtLink = document.querySelector('a[href="management.html"]');
      if (mgmtLink) mgmtLink.style.display = 'none';
    }
  }).catch(function(){});

  // Update hero once profile loads (auth.js sets profileName async)
  var heroObserver = new MutationObserver(function() { renderHero(); });
  var pnEl = document.getElementById('profileName');
  if (pnEl) heroObserver.observe(pnEl, { childList: true, characterData: true, subtree: true });

  // Delayed iOS check (wait for beforeinstallprompt to potentially fire)
  setTimeout(checkiOSInstall, 1000);
})();
</script>
<script src="sw-register.js?v=52"></script>
