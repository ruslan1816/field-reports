<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NW Field">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0696D7">
<title>Schedule — Northern Wolves AC</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js?v=123"></script>
<script src="auth.js?v=123"></script>
<script src="schedule-utils.js?v=137"></script>
<style>
  body { padding-bottom: 24px; }
  .header .profile-circle { margin-left: auto; }
  .schedule-wrap { max-width: 1100px; margin: 0 auto; }

  /* Top action bar — view tabs + lookahead range */
  .schedule-toolbar {
    display: flex; gap: 8px; padding: 12px 16px; align-items: center; flex-wrap: wrap;
    background: var(--nw-card); border-bottom: 1px solid var(--nw-border);
    position: sticky; top: 0; z-index: 50;
  }
  .schedule-toolbar .grow { flex: 1; }
  .view-tab {
    padding: 8px 12px; border-radius: 8px; background: var(--nw-section);
    color: var(--nw-muted); cursor: pointer; font-size: 13px; font-weight: 600;
    border: 1px solid transparent; transition: all .15s ease; user-select: none;
  }
  .view-tab.active { background: var(--nw-primary); color: #fff; }
  .view-tab:not(.active):hover { background: #e2e8f0; }
  .lookahead-select { padding: 8px 10px; font-size: 13px; border: 1px solid var(--nw-border); border-radius: 6px; background: #fff; }

  .new-entry-btn {
    background: linear-gradient(135deg, #0696D7, #0479B2); color: #fff; border: none;
    padding: 10px 16px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(6, 150, 215, 0.25); display: inline-flex; align-items: center; gap: 6px;
  }
  .new-entry-btn:active { transform: translateY(1px); }
  .new-entry-btn:disabled { opacity: .55; cursor: not-allowed; }

  /* Filter row */
  .filter-row {
    display: flex; gap: 8px; padding: 8px 16px; flex-wrap: wrap;
    border-bottom: 1px solid var(--nw-border); background: #f8fafc;
  }
  .filter-row select, .filter-row input {
    padding: 6px 10px; font-size: 13px; border: 1px solid var(--nw-border); border-radius: 6px; background: #fff;
  }
  .filter-row .clear-btn {
    background: transparent; border: 1px solid var(--nw-border); border-radius: 6px;
    padding: 6px 10px; cursor: pointer; font-size: 12px; color: var(--nw-muted);
  }

  /* Day group — list view */
  .day-group { margin: 16px; }
  .day-header {
    font-size: 14px; font-weight: 700; color: var(--nw-text);
    margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .day-header.today  { color: var(--nw-primary); }
  .day-header .day-count {
    background: var(--nw-section); color: var(--nw-muted); font-size: 11px;
    font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  /* Mini project header inside a day group — separates multi-crew jobs */
  .proj-mini-header {
    font-size: 12px; font-weight: 700; color: var(--nw-text);
    padding: 6px 10px; margin: 8px 0 4px;
    background: linear-gradient(90deg, #eff6ff, transparent);
    border-left: 3px solid var(--nw-primary);
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Entry card */
  .entry-card {
    background: var(--nw-card); border: 1px solid var(--nw-border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
    transition: border-color .15s ease, box-shadow .15s ease;
    border-left-width: 4px;
  }
  .entry-card:hover { border-color: var(--nw-primary); box-shadow: 0 2px 8px rgba(6,150,215,.08); }
  .entry-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .entry-crew { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; color: #fff; white-space: nowrap; }
  .entry-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; background: var(--nw-section); color: var(--nw-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .entry-priority { font-size: 11px; font-weight: 700; }
  .entry-dates { font-size: 12px; color: var(--nw-muted); margin-left: auto; }

  .entry-project { font-weight: 700; font-size: 15px; color: var(--nw-text); margin-bottom: 2px; }
  .entry-project-meta { font-size: 12px; color: var(--nw-muted); margin-bottom: 6px; }
  .entry-techs { font-size: 13px; color: var(--nw-text); }
  .entry-techs .label { color: var(--nw-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-right: 6px; }
  .entry-needed {
    display: inline-block; margin-left: 6px; font-size: 11px;
    background: #fef3c7; color: #92400e; padding: 1px 8px; border-radius: 6px; font-weight: 700;
  }
  .entry-scope {
    margin-top: 6px; font-size: 12px; color: var(--nw-muted);
    background: var(--nw-section); padding: 6px 10px; border-radius: 6px;
  }

  .empty-state-schedule {
    padding: 40px 20px; text-align: center; color: var(--nw-muted);
  }
  .empty-state-schedule .icon { font-size: 36px; margin-bottom: 10px; opacity: .5; }
  .empty-state-schedule p { font-size: 14px; margin: 0; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
    display: none; align-items: flex-start; justify-content: center; padding: 24px 12px;
    z-index: 200; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: #fff; border-radius: 14px; width: 100%; max-width: 600px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25); padding: 20px 22px 24px;
  }
  .modal-card h2 { font-size: 18px; margin: 0 0 14px; }
  .modal-card .field { margin-bottom: 12px; }
  .modal-card label { display: block; font-size: 12px; font-weight: 700; color: var(--nw-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-card input, .modal-card select, .modal-card textarea {
    width: 100%; padding: 9px 11px; font-size: 14px; border: 1px solid var(--nw-border);
    border-radius: 7px; box-sizing: border-box; font-family: inherit;
  }
  .modal-card textarea { min-height: 70px; resize: vertical; }
  .modal-card .row { display: flex; gap: 10px; }
  .modal-card .row > .field { flex: 1; }

  /* Tech chip picker */
  .techs-picker { border: 1px solid var(--nw-border); border-radius: 7px; padding: 8px; max-height: 200px; overflow-y: auto; background: #fafbfd; }
  .tech-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; margin: 3px; border-radius: 14px;
    border: 1px solid var(--nw-border); background: #fff;
    font-size: 12px; cursor: pointer; user-select: none;
    transition: all .12s ease;
  }
  .tech-chip:hover { border-color: var(--nw-primary); }
  .tech-chip.selected { background: var(--nw-primary); color: #fff; border-color: var(--nw-primary); font-weight: 600; }
  .tech-chip.foreman::before { content: '★'; margin-right: 2px; color: #f59e0b; }
  .tech-chip.selected.foreman::before { color: #fef3c7; }
  .tech-chip-skill { font-size: 9px; opacity: .65; margin-left: 4px; text-transform: uppercase; }
  .tech-chip.unavailable {
    background: #f1f5f9; color: #94a3b8;
    border-color: #cbd5e1 !important; cursor: not-allowed;
    opacity: 0.65; text-decoration: line-through;
  }
  .tech-chip.unavailable::after {
    content: '🔒'; margin-left: 4px; font-size: 10px; text-decoration: none;
  }
  .tech-chip.unavailable:hover { border-color: #cbd5e1; }
  .tech-chip-shake { animation: chipshake 0.3s; }
  @keyframes chipshake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }
  .conflict-toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #dc2626; color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600; z-index: 300;
    box-shadow: 0 8px 24px rgba(0,0,0,.3); max-width: 90%;
    animation: slideup 0.2s ease;
  }
  @keyframes slideup {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  .modal-actions {
    display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end;
  }
  .modal-actions button {
    padding: 9px 18px; border-radius: 7px; font-weight: 700; font-size: 14px;
    cursor: pointer; border: none;
  }
  .btn-cancel { background: var(--nw-section); color: var(--nw-text); border: 1px solid var(--nw-border) !important; }
  .btn-save   { background: var(--nw-primary); color: #fff; }
  .btn-delete { background: var(--nw-danger); color: #fff; margin-right: auto; }

  /* Comments */
  .comments-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--nw-border); }
  .comment {
    background: var(--nw-section); padding: 8px 12px; border-radius: 8px;
    margin-bottom: 6px; font-size: 13px; position: relative;
  }
  .comment-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .comment-author { font-weight: 700; color: var(--nw-text); }
  .comment-time { font-size: 11px; color: var(--nw-muted); }
  .comment-actions {
    margin-left: auto; display: flex; gap: 4px;
    opacity: 0.6; transition: opacity 0.15s ease;
  }
  .comment:hover .comment-actions { opacity: 1; }
  .comment-action-btn {
    padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600;
    background: transparent; border: 1px solid transparent; cursor: pointer;
    color: var(--nw-muted);
  }
  .comment-action-btn:hover { background: #fff; border-color: var(--nw-border); color: var(--nw-text); }
  .comment-action-btn.del { color: #b91c1c; }
  .comment-action-btn.del:hover { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
  .comment-body { margin-top: 4px; white-space: pre-wrap; }
  .comment-edit-area {
    margin-top: 6px;
    display: flex; gap: 6px; flex-direction: column;
  }
  .comment-edit-area textarea {
    width: 100%; padding: 6px 10px; font-size: 13px; font-family: inherit;
    border: 1px solid var(--nw-primary); border-radius: 6px; resize: vertical;
    min-height: 50px; box-sizing: border-box;
  }
  .comment-edit-buttons { display: flex; gap: 6px; }
  .comment-edit-buttons button {
    padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 1px solid var(--nw-border);
  }
  .comment-edit-buttons .save-btn { background: var(--nw-primary); color: #fff; border-color: var(--nw-primary); }
  .comment-edit-buttons .cancel-btn { background: #fff; color: var(--nw-muted); }

  .comment-add {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .comment-add input { flex: 1; }
  .comment-add button { padding: 8px 14px; background: var(--nw-primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }

  /* ────────────────── Availability view ────────────────── */
  .avail-section { margin: 16px; }
  .avail-section h3 {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--nw-muted);
    margin: 0 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .avail-section h3 .crew-icon { font-size: 16px; }
  .avail-section h3 .pill {
    background: var(--nw-section); padding: 2px 9px; border-radius: 10px;
    font-size: 11px; font-weight: 700; color: var(--nw-text);
  }
  .avail-tech-row {
    background: var(--nw-card); border: 1px solid var(--nw-border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-left-width: 4px;
  }
  .avail-tech-row.free { border-left-color: var(--nw-success); }
  .avail-tech-row.busy { border-left-color: #f59e0b; }
  .avail-tech-row .tech-name { font-weight: 700; font-size: 14px; color: var(--nw-text); flex: 1; }
  .avail-tech-row .tech-name .star { color: #f59e0b; margin-right: 4px; }
  .avail-tech-row .tech-position {
    font-size: 11px; color: var(--nw-muted); margin-top: 2px;
    width: 100%;
  }
  .avail-tag {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px;
    white-space: nowrap;
  }
  .avail-tag.free  { background: #d1fae5; color: #065f46; }
  .avail-tag.busy  { background: #fef3c7; color: #92400e; }
  .avail-on  { background: #dbeafe; color: #1e40af; padding: 3px 9px; border-radius: 12px;
               font-size: 11px; font-weight: 700; cursor: pointer; }
  .avail-on:hover { background: #bfdbfe; }

  .avail-date-picker {
    display: flex; gap: 10px; align-items: center; margin: 12px 16px 0;
    padding: 10px 12px; background: var(--nw-section); border-radius: 8px;
  }
  .avail-date-picker label { font-size: 12px; font-weight: 700; color: var(--nw-muted); }
  .avail-date-picker input {
    padding: 6px 10px; border: 1px solid var(--nw-border); border-radius: 6px; font-size: 13px;
  }

  /* ────────────────── Timeline (CSS Grid Gantt) ────────────────── */
  .timeline-wrap {
    margin: 12px;
    background: var(--nw-card);
    border: 1px solid var(--nw-border);
    border-radius: 10px;
    overflow: auto;
    max-height: calc(100vh - 220px);
    position: relative;
  }
  .tl-grid {
    display: grid;
    /* Project column 220px, then N day columns 1fr each */
    grid-template-columns: 220px repeat(var(--tl-days, 14), minmax(56px, 1fr));
    grid-auto-rows: minmax(38px, auto);
    font-size: 12px;
    background: #fff;
    min-width: 900px;
  }
  /* Header row */
  .tl-header {
    position: sticky; top: 0;
    background: #f1f5f9;
    border-right: 1px solid var(--nw-border);
    border-bottom: 2px solid var(--nw-border);
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--nw-text);
    text-align: center;
    z-index: 5;
  }
  .tl-header.weekend { background: #fee2e2; color: #991b1b; }
  .tl-header.today   { background: var(--nw-primary); color: #fff; }
  .tl-header.project-col {
    text-align: left; padding: 8px 12px;
    background: #f8fafc;
    position: sticky; left: 0; top: 0; z-index: 11;
    border-right: 2px solid var(--nw-border);
  }
  /* Project name cell on the left of each project row */
  .tl-project-cell {
    grid-column: 1;
    position: sticky; left: 0; z-index: 4;
    background: var(--nw-card);
    border-right: 2px solid var(--nw-border);
    border-bottom: 1px solid var(--nw-border);
    padding: 8px 12px;
    font-weight: 600;
    font-size: 13px;
  }
  .tl-project-cell .pcode {
    color: var(--nw-muted); font-size: 11px; margin-right: 6px;
  }
  .tl-project-cell .pcustomer {
    display: block; font-size: 11px; font-weight: 400; color: var(--nw-muted); margin-top: 2px;
  }
  /* Background day cells — for grid lines & weekend/today highlight */
  .tl-cell {
    border-right: 1px solid #e2e8f0;
    border-bottom: 1px solid #e2e8f0;
    min-height: 38px;
    background: #fff;
  }
  .tl-cell.weekend { background: #fef2f2; }
  .tl-cell.today   { background: rgba(6,150,215,0.06); }

  /* Entry block — spans grid columns natively via grid-column: A / span N */
  .tl-block {
    background: var(--block-color, #0696D7);
    color: #fff;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    line-height: 1.15;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    margin: 3px 2px;
    z-index: 2;
    align-self: stretch;
    transition: filter 0.1s ease;
    position: relative;
    display: flex; flex-direction: column; justify-content: center; gap: 1px;
  }
  .tl-block:hover { filter: brightness(1.08); z-index: 3; }
  .tl-block .tl-line {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tl-block .tl-line-1 { font-size: 11px; font-weight: 700; }
  .tl-block .tl-line-2 { font-size: 10px; font-weight: 500; opacity: 0.92; }
  .tl-block .tl-line-2.need {
    background: rgba(255,255,255,0.22); padding: 1px 6px; border-radius: 6px;
    align-self: flex-start; font-weight: 700;
  }
  .tl-block.tl-block-priority-urgent { box-shadow: 0 0 0 2px #dc2626, 0 1px 3px rgba(0,0,0,.15); }

  .timeline-empty {
    padding: 60px 20px; text-align: center; color: var(--nw-muted);
  }
  .timeline-mobile-hint {
    padding: 8px 12px; background: #f0f9ff; border: 1px solid #bae6fd;
    border-radius: 8px; margin: 0 12px 8px; font-size: 12px; color: #0c4a6e; text-align: center;
    display: none;
  }

  /* Mobile: keep timeline visible, allow horizontal scroll, narrow columns */
  @media (max-width: 760px) {
    .tl-grid {
      grid-template-columns: 140px repeat(var(--tl-days, 14), minmax(48px, 1fr));
      font-size: 11px;
      min-width: 700px;
    }
    .tl-project-cell { padding: 6px 8px; font-size: 12px; }
    .tl-project-cell .pcustomer { font-size: 10px; }
    .tl-block { padding: 3px 6px; }
    .tl-block .tl-line-1 { font-size: 10px; }
    .tl-block .tl-line-2 { font-size: 9px; }
    .tl-header { padding: 5px 2px; font-size: 10px; }
    .timeline-wrap { max-height: calc(100vh - 200px); }
    .timeline-mobile-hint { display: block; }
  }

  @media (max-width: 600px) {
    .schedule-toolbar { gap: 6px; }
    .view-tab { padding: 6px 10px; font-size: 12px; }
    .modal-card { padding: 16px 16px 20px; }
    .entry-dates { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<div class="schedule-wrap">

  <div class="header">
    <a href="index.html" class="back-btn">&#8592;</a>
    <div class="header-content">
      <h1>Schedule</h1>
    </div>
    <div class="profile-circle" id="profileCircle">--</div>
  </div>

  <!-- Toolbar -->
  <div class="schedule-toolbar">
    <div class="view-tab active" data-view="list">📋 List</div>
    <div class="view-tab" data-view="timeline">📊 Timeline</div>
    <div class="view-tab" data-view="by-crew">👷 By Crew</div>
    <div class="view-tab" data-view="by-project">📁 By Project</div>
    <div class="view-tab" data-view="availability">🟢 Availability</div>
    <div class="view-tab" data-view="my-schedule" id="myScheduleTab">📌 My Schedule</div>
    <select class="lookahead-select" id="lookaheadDays">
      <option value="7">Next 1 week</option>
      <option value="14" selected>Next 2 weeks</option>
      <option value="21">Next 3 weeks</option>
      <option value="30">Next 30 days</option>
    </select>
    <div class="grow"></div>
    <a href="crew.html"             class="view-tab" style="text-decoration:none">👷 Crew</a>
    <a href="subcontractors.html"  class="view-tab" style="text-decoration:none">🏗️ Subs</a>
    <a href="project-managers.html" class="view-tab" style="text-decoration:none">👤 PMs</a>
    <a href="pm-templates.html"     class="view-tab" style="text-decoration:none">🔁 PM Templates</a>
    <button class="new-entry-btn" id="btnNewEntry">+ New Entry</button>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <select id="filterCrew">
      <option value="">All crews</option>
    </select>
    <select id="filterProject">
      <option value="">All projects</option>
    </select>
    <select id="filterTech">
      <option value="">All techs</option>
    </select>
    <select id="filterStatus">
      <option value="">All statuses</option>
    </select>
    <button class="clear-btn" id="btnClearFilters">Clear</button>
  </div>

  <div id="scheduleBody"></div>

</div>

<!-- New / Edit Entry Modal -->
<div class="modal-overlay" id="entryModal">
  <div class="modal-card">
    <h2 id="modalTitle">New Schedule Entry</h2>

    <div class="field">
      <label>Project *</label>
      <select id="mEntryProject" required></select>
    </div>

    <div class="row">
      <div class="field">
        <label>Crew Type *</label>
        <select id="mEntryCrew" required></select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="mEntryPriority"></select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Start Date *</label>
        <input type="date" id="mEntryStart" required>
      </div>
      <div class="field">
        <label>End Date *</label>
        <input type="date" id="mEntryEnd" required>
      </div>
    </div>

    <div class="field">
      <label>Manpower Needed (count)</label>
      <input type="number" id="mEntryManpower" min="0" placeholder="e.g. 2 pipefitters → 2">
    </div>

    <div class="field">
      <label>Assign Techs</label>
      <div class="techs-picker" id="mEntryTechs"></div>
    </div>

    <div class="field">
      <label>Subcontractor (if applicable)</label>
      <input type="text" id="mEntrySub" list="subList" autocomplete="off"
             placeholder="Type or pick from list — e.g. ADLS (Jason)">
      <datalist id="subList"></datalist>
    </div>

    <div class="field">
      <label>Scope summary (one-liner shown in cards)</label>
      <input type="text" id="mEntryScope" placeholder="e.g. Install 50ft refrigerant piping">
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="mEntryNotes" placeholder="Additional details..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Status</label>
        <select id="mEntryStatus"></select>
      </div>
    </div>

    <!-- Comments (only shown when editing) -->
    <div class="comments-section" id="commentsSection" style="display:none">
      <label style="font-size:13px;font-weight:700;color:var(--nw-text);margin-bottom:8px;display:block">Notes &amp; Requests</label>
      <div id="commentsList"></div>
      <div class="comment-add">
        <input type="text" id="commentInput" placeholder="Add a note or request...">
        <button id="btnAddComment">Add</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btnDeleteEntry" style="display:none">Delete</button>
      <button class="btn-cancel" id="btnCancelEntry">Cancel</button>
      <button class="btn-save" id="btnSaveEntry">Save</button>
    </div>
  </div>
</div>

<script>
requireAuth().catch(function(){});

(function() {
  'use strict';

  var allTechs = [];
  var allProjects = [];
  var canWrite = false;
  var currentUserId = null;   // profiles.id of the signed-in user (for comment ownership)
  var editingEntryId = null;
  var lookaheadDays = 14;
  var currentView = 'list';
  var conflictMap = {};   // techId -> [conflicts] for the current modal date range
  var conflictDebounce = null;
  var myTechId = null;    // schedule_techs.id for the current user (if linked)

  // ─── INIT ──────────────────────────────────────────────────────────────
  init();

  async function init() {
    canWrite = await NWSchedule.canWriteSchedule();
    if (!canWrite) {
      var btn = document.getElementById('btnNewEntry');
      if (btn) {
        btn.style.display = 'none';
      }
    }

    populateCrewDropdown('filterCrew');
    populateCrewDropdown('mEntryCrew');
    populateStatusDropdown('filterStatus');
    populateStatusDropdown('mEntryStatus');
    populatePriorityDropdown('mEntryPriority');

    // Load techs, projects, subs in parallel
    var [techsR, projsR, subsR] = await Promise.all([
      NWSchedule.listTechs(),
      NWSchedule.listScheduleProjects(),
      NWSchedule.listSubcontractors()
    ]);
    allTechs = techsR.data || [];
    allProjects = projsR.data || [];
    var subs = subsR.data || [];

    populateTechFilter();
    populateProjectFilter();
    populateProjectDropdown('mEntryProject');
    populateSubDatalist(subs);

    // Resolve my schedule_techs.id by matching profile_id (if linked)
    try {
      var u = await supabaseClient.auth.getUser();
      var uid = u.data && u.data.user ? u.data.user.id : null;
      if (uid) {
        currentUserId = uid;
        var match = allTechs.find(function(t) { return t.profile_id === uid; });
        if (match) myTechId = match.id;
      }
    } catch (e) {}
    // Hide "My Schedule" tab if we can't link the user to a tech record
    if (!myTechId) {
      var msTab = document.getElementById('myScheduleTab');
      if (msTab) msTab.style.display = 'none';
    }

    bindEvents();
    refreshSchedule();
  }

  // ─── DROPDOWNS ─────────────────────────────────────────────────────────

  function populateCrewDropdown(id) {
    var el = document.getElementById(id);
    var keep = el.firstElementChild;  // keep "All crews" option for filter
    el.innerHTML = '';
    if (id === 'filterCrew' && keep) el.appendChild(keep);
    if (id === 'mEntryCrew') {
      var blank = document.createElement('option'); blank.value=''; blank.textContent='Select…';
      el.appendChild(blank);
    }
    NWSchedule.CREW_TYPES.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.value;
      opt.textContent = c.icon + ' ' + c.label;
      el.appendChild(opt);
    });
  }
  function populateStatusDropdown(id) {
    var el = document.getElementById(id);
    var keep = el.firstElementChild;
    el.innerHTML = '';
    if (id === 'filterStatus' && keep) el.appendChild(keep);
    NWSchedule.STATUSES.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s.value; opt.textContent = s.label;
      el.appendChild(opt);
    });
  }
  function populatePriorityDropdown(id) {
    var el = document.getElementById(id);
    NWSchedule.PRIORITIES.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.value; opt.textContent = p.label;
      if (p.value === 'normal') opt.selected = true;
      el.appendChild(opt);
    });
  }
  function populateProjectFilter() {
    var el = document.getElementById('filterProject');
    while (el.children.length > 1) el.removeChild(el.lastChild);
    allProjects.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = (p.short_code ? p.short_code + ' · ' : '') + p.name;
      el.appendChild(opt);
    });
  }
  function populateProjectDropdown(id) {
    var el = document.getElementById(id);
    el.innerHTML = '';
    var blank = document.createElement('option'); blank.value=''; blank.textContent='Select project…';
    el.appendChild(blank);
    allProjects.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      var label = (p.short_code ? p.short_code + ' · ' : '') + p.name;
      if (p.customer) label += ' (' + p.customer + ')';
      if (p.pm_name)  label += ' — PM: ' + p.pm_name;
      opt.textContent = label;
      el.appendChild(opt);
    });
  }
  function populateTechFilter() {
    var el = document.getElementById('filterTech');
    while (el.children.length > 1) el.removeChild(el.lastChild);
    allTechs.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.full_name + (t.is_foreman ? ' ★' : '');
      el.appendChild(opt);
    });
  }

  function populateSubDatalist(subs) {
    var el = document.getElementById('subList');
    if (!el) return;
    el.innerHTML = '';
    subs.forEach(function(s) {
      var opt = document.createElement('option');
      // Use display_name (e.g. "ADLS (Jason)") so picking it auto-fills the
      // input with the standard NW-formatted string. If display_name is
      // empty (no contact), fall back to plain name.
      opt.value = s.display_name || s.name;
      // The label hint (shown right of the value in some browsers) can
      // include the trade for context.
      if (s.trade) opt.label = s.trade;
      el.appendChild(opt);
    });
  }

  // ─── EVENTS ────────────────────────────────────────────────────────────

  function bindEvents() {
    document.getElementById('lookaheadDays').addEventListener('change', function(e) {
      lookaheadDays = parseInt(e.target.value, 10) || 14;
      refreshSchedule();
    });
    document.querySelectorAll('.view-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.view-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentView = tab.getAttribute('data-view');
        refreshSchedule();
      });
    });

    ['filterCrew','filterProject','filterTech','filterStatus'].forEach(function(id) {
      document.getElementById(id).addEventListener('change', refreshSchedule);
    });
    document.getElementById('btnClearFilters').addEventListener('click', function() {
      ['filterCrew','filterProject','filterTech','filterStatus'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
      refreshSchedule();
    });

    document.getElementById('btnNewEntry').addEventListener('click', function() { openModal(null); });
    document.getElementById('btnCancelEntry').addEventListener('click', closeModal);
    document.getElementById('btnSaveEntry').addEventListener('click', saveEntry);
    document.getElementById('btnDeleteEntry').addEventListener('click', deleteEntry);
    // Re-evaluate tech availability when start/end date changes
    document.getElementById('mEntryStart').addEventListener('change', scheduleConflictRefresh);
    document.getElementById('mEntryEnd').addEventListener('change', scheduleConflictRefresh);
    document.getElementById('btnAddComment').addEventListener('click', addCommentHandler);
    document.getElementById('commentInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addCommentHandler();
    });
    document.getElementById('entryModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  }

  // ─── REFRESH ───────────────────────────────────────────────────────────

  async function refreshSchedule() {
    var body = document.getElementById('scheduleBody');
    body.innerHTML = '<div class="empty-state-schedule"><div class="icon">⏳</div><p>Loading…</p></div>';

    var from = NWSchedule.todayISO();
    var to = NWSchedule.addDays(from, lookaheadDays);

    var opts = { from: from, to: to };
    var crewFilter = document.getElementById('filterCrew').value;
    var projFilter = document.getElementById('filterProject').value;
    var statusFilter = document.getElementById('filterStatus').value;
    var techFilter = document.getElementById('filterTech').value;
    if (crewFilter)   opts.crewType = crewFilter;
    if (projFilter)   opts.projectId = projFilter;
    if (statusFilter) opts.status = statusFilter;

    var r = await NWSchedule.listEntries(opts);
    if (r.error) {
      body.innerHTML = '<div class="empty-state-schedule"><div class="icon">⚠️</div><p>Error loading schedule: ' +
        (r.error.message || r.error) + '</p></div>';
      return;
    }
    var entries = r.data || [];
    // "My Schedule" view auto-filters to entries assigned to current user
    if (currentView === 'my-schedule' && myTechId) {
      entries = entries.filter(function(e) {
        return (e.assigned_tech_ids || []).indexOf(myTechId) !== -1;
      });
    } else if (techFilter) {
      entries = entries.filter(function(e) {
        return (e.assigned_tech_ids || []).indexOf(techFilter) !== -1;
      });
    }

    if (!entries.length) {
      body.innerHTML = '<div class="empty-state-schedule">' +
        '<div class="icon">📅</div>' +
        '<p>No schedule entries in this range.<br>' +
          (canWrite ? 'Click <strong>+ New Entry</strong> to add one.' : 'Ask a manager to schedule work.') +
        '</p></div>';
      return;
    }

    if (currentView === 'by-crew') renderByCrew(entries);
    else if (currentView === 'by-project') renderByProject(entries);
    else if (currentView === 'timeline') renderTimeline(entries);
    else if (currentView === 'availability') renderAvailability(entries);
    else renderByDay(entries);  // 'list' or 'my-schedule' both render as day groups
  }

  // ─── RENDERERS ─────────────────────────────────────────────────────────

  function renderByDay(entries) {
    // Expand multi-day entries — include each entry on every day it covers
    var byDay = {};
    var today = NWSchedule.todayISO();
    var from = today;
    var to = NWSchedule.addDays(from, lookaheadDays);

    entries.forEach(function(e) {
      var dStart = e.start_date < from ? from : e.start_date;
      var dEnd   = e.end_date > to ? to : e.end_date;
      var d = dStart;
      while (d <= dEnd) {
        if (!byDay[d]) byDay[d] = [];
        byDay[d].push(e);
        d = NWSchedule.addDays(d, 1);
      }
    });

    var days = Object.keys(byDay).sort();
    var html = '';
    days.forEach(function(d) {
      var label = NWSchedule.fmtDateLong(d);
      var isToday = (d === today);
      var todayClass = isToday ? ' today' : '';

      // Sort entries within this day so all crews of the same project
      // appear next to each other. Order: project name asc → crew_type → start_date.
      // Entries without a project go last.
      byDay[d].sort(function(a, b) {
        var na = a.project ? (a.project.name || '') : '';
        var nb = b.project ? (b.project.name || '') : '';
        if (!na && nb) return 1;
        if (na && !nb) return -1;
        if (na !== nb) return na.localeCompare(nb);
        if (a.crew_type !== b.crew_type) return (a.crew_type || '').localeCompare(b.crew_type || '');
        return (a.start_date || '').localeCompare(b.start_date || '');
      });

      html += '<div class="day-group">' +
        '<div class="day-header' + todayClass + '">' +
          (isToday ? '🌟 TODAY · ' : '') + label +
          '<span class="day-count">' + byDay[d].length + '</span>' +
        '</div>';
      // Render with per-project sub-headers so multi-crew jobs are visually grouped.
      var lastProjectId = null;
      byDay[d].forEach(function(e) {
        var pid = e.project_id || '__none__';
        if (pid !== lastProjectId) {
          var p = e.project;
          var projTitle = p ? ((p.short_code ? p.short_code + ' · ' : '') + p.name) : 'No project';
          html += '<div class="proj-mini-header">📁 ' + escHtml(projTitle) + '</div>';
          lastProjectId = pid;
        }
        html += renderEntryCard(e);
      });
      html += '</div>';
    });
    document.getElementById('scheduleBody').innerHTML = html;
    bindEntryClicks();
  }

  function renderByCrew(entries) {
    // Group by crew_type
    var byCrew = {};
    entries.forEach(function(e) {
      if (!byCrew[e.crew_type]) byCrew[e.crew_type] = [];
      byCrew[e.crew_type].push(e);
    });
    var html = '';
    NWSchedule.CREW_TYPES.forEach(function(ct) {
      var list = byCrew[ct.value];
      if (!list || !list.length) return;

      // Sort within crew section by project name
      list.sort(function(a, b) {
        var na = a.project ? (a.project.name || '') : '';
        var nb = b.project ? (b.project.name || '') : '';
        if (!na && nb) return 1;
        if (na && !nb) return -1;
        if (na !== nb) return na.localeCompare(nb);
        return (a.start_date || '').localeCompare(b.start_date || '');
      });

      html += '<div class="day-group">' +
        '<div class="day-header" style="color:' + ct.color + '">' +
          ct.icon + ' ' + ct.label +
          '<span class="day-count">' + list.length + '</span>' +
        '</div>';
      list.forEach(function(e) { html += renderEntryCard(e); });
      html += '</div>';
    });
    document.getElementById('scheduleBody').innerHTML = html || '<div class="empty-state-schedule"><div class="icon">📅</div><p>No entries.</p></div>';
    bindEntryClicks();
  }

  function renderByProject(entries) {
    var byProj = {};
    entries.forEach(function(e) {
      var pid = e.project_id || '__none__';
      if (!byProj[pid]) byProj[pid] = [];
      byProj[pid].push(e);
    });
    var html = '';
    var keys = Object.keys(byProj).sort(function(a, b) {
      var na = byProj[a][0].project ? byProj[a][0].project.name : 'No project';
      var nb = byProj[b][0].project ? byProj[b][0].project.name : 'No project';
      return na.localeCompare(nb);
    });
    keys.forEach(function(pid) {
      var list = byProj[pid];
      var p = list[0].project;
      var name = p ? (p.short_code ? p.short_code + ' · ' : '') + p.name : 'No project';
      html += '<div class="day-group">' +
        '<div class="day-header">' +
          '📁 ' + escHtml(name) +
          '<span class="day-count">' + list.length + '</span>' +
        '</div>';
      list.forEach(function(e) { html += renderEntryCard(e); });
      html += '</div>';
    });
    document.getElementById('scheduleBody').innerHTML = html;
    bindEntryClicks();
  }

  // ─── TIMELINE / GANTT VIEW (CSS Grid) ──────────────────────────────────
  // Each row of the grid spans the project cell (col 1) plus N day columns
  // (cols 2..N+1). Entry blocks are placed via grid-column: A / span B which
  // natively spans multiple days.
  function renderTimeline(entries) {
    var body = document.getElementById('scheduleBody');
    var startISO = NWSchedule.todayISO();
    var endISO   = NWSchedule.addDays(startISO, lookaheadDays);

    var days = [];
    var d = startISO;
    while (d <= endISO) {
      var dt = new Date(d + 'T00:00:00');
      days.push({
        iso: d,
        label: dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        weekday: dt.toLocaleDateString('en-US', { weekday: 'short' }),
        isWeekend: (dt.getDay() === 0 || dt.getDay() === 6),
        isToday: (d === startISO)
      });
      d = NWSchedule.addDays(d, 1);
    }
    var totalDays = days.length;

    // Group entries by project
    var byProj = {};
    entries.forEach(function(e) {
      var pid = e.project_id || '__none__';
      if (!byProj[pid]) byProj[pid] = { project: e.project, entries: [] };
      byProj[pid].entries.push(e);
    });
    var projKeys = Object.keys(byProj).sort(function(a, b) {
      var na = byProj[a].project ? byProj[a].project.name || '' : 'No project';
      var nb = byProj[b].project ? byProj[b].project.name || '' : 'No project';
      return na.localeCompare(nb);
    });

    if (!projKeys.length) {
      body.innerHTML = '<div class="timeline-empty"><div style="font-size:36px;opacity:.4">📊</div>' +
        '<p style="margin-top:8px">No entries to plot in this range.</p></div>';
      return;
    }

    var html = '<div class="timeline-mobile-hint">' +
      '👉 Swipe left/right to scroll through dates · Tap any block to edit</div>';

    html += '<div class="timeline-wrap"><div class="tl-grid" style="--tl-days:' + totalDays + '">';

    // Header row
    html += '<div class="tl-header project-col">Project</div>';
    days.forEach(function(day) {
      var cls = 'tl-header';
      if (day.isToday) cls += ' today';
      else if (day.isWeekend) cls += ' weekend';
      html += '<div class="' + cls + '">' +
        '<div style="font-size:9px;opacity:0.85">' + day.weekday + '</div>' +
        '<div>' + day.label + '</div></div>';
    });

    // For each project, compact-stack entries into multiple rows when needed
    // so two overlapping entries don't sit on top of each other.
    var gridRow = 2;  // header is row 1
    projKeys.forEach(function(pid) {
      var g = byProj[pid];
      var projName = g.project ? g.project.name : 'No project';
      var projShort = g.project ? g.project.short_code : '';
      var projCustomer = g.project ? g.project.customer : '';
      var projPM = g.project ? (g.project.pm_name || '') : '';

      // Pack entries into rows where time ranges don't overlap
      var subRows = [];
      g.entries.slice().sort(function(a, b) {
        return a.start_date.localeCompare(b.start_date);
      }).forEach(function(e) {
        var placed = false;
        for (var i = 0; i < subRows.length; i++) {
          var last = subRows[i][subRows[i].length - 1];
          if (last.end_date < e.start_date) {
            subRows[i].push(e);
            placed = true;
            break;
          }
        }
        if (!placed) subRows.push([e]);
      });

      var totalSubRows = Math.max(1, subRows.length);

      // Project cell — spans all sub-rows for this project
      html += '<div class="tl-project-cell" style="grid-row: ' + gridRow + ' / span ' + totalSubRows + '">' +
        (projShort ? '<span class="pcode">' + escHtml(projShort) + '</span>' : '') +
        escHtml(projName) +
        (projCustomer ? '<span class="pcustomer">' + escHtml(projCustomer) +
          (projPM ? ' · 👤 PM: ' + escHtml(projPM) : '') + '</span>' :
          (projPM ? '<span class="pcustomer">👤 PM: ' + escHtml(projPM) + '</span>' : '')) +
        '</div>';

      // Background grid cells (one per day per sub-row)
      for (var sr = 0; sr < totalSubRows; sr++) {
        days.forEach(function(day, dayIdx) {
          var cls = 'tl-cell';
          if (day.isToday) cls += ' today';
          else if (day.isWeekend) cls += ' weekend';
          html += '<div class="' + cls + '" style="grid-row:' + (gridRow + sr) + ';grid-column:' + (dayIdx + 2) + '"></div>';
        });
      }

      // Entry blocks — placed natively via grid-column: A / span B
      subRows.forEach(function(rowEntries, rowIdx) {
        rowEntries.forEach(function(e) {
          var ct = NWSchedule.crewTypeMeta(e.crew_type);
          var ds = e.start_date < startISO ? startISO : e.start_date;
          var de = e.end_date > endISO ? endISO : e.end_date;
          var startIdx = days.findIndex(function(d) { return d.iso === ds; });
          var endIdx   = days.findIndex(function(d) { return d.iso === de; });
          if (startIdx === -1 || endIdx === -1) return;
          var spanCount = endIdx - startIdx + 1;
          var startCol = startIdx + 2;  // col 1 = project
          var endCol   = startCol + spanCount;

          var assignedCount = (e.assigned_tech_ids || []).length;
          var needCount = (e.manpower_needed || 0) - assignedCount;
          var hasNeed = needCount > 0;
          var prio = (e.priority === 'urgent') ? ' tl-block-priority-urgent' : '';

          // Build crew names: first names only when 3+ assigned, full names for 1-2
          var crewLabel = '';
          var fullCrewList = [];
          if (e.assigned_tech_names && e.assigned_tech_names.length) {
            fullCrewList = e.assigned_tech_names.slice();
            if (e.is_subcontractor && e.subcontractor_name) {
              fullCrewList.push('🏗️ ' + e.subcontractor_name);
            }
            if (fullCrewList.length === 1) {
              crewLabel = fullCrewList[0];
            } else if (fullCrewList.length === 2) {
              crewLabel = fullCrewList.join(', ');
            } else {
              // First names only for 3+
              var firsts = fullCrewList.map(function(n) {
                if (n.indexOf('🏗️') === 0) return n;
                return (n.split(' ')[0] || n);
              });
              crewLabel = firsts.join(', ');
            }
          } else if (e.is_subcontractor && e.subcontractor_name) {
            crewLabel = '🏗️ ' + e.subcontractor_name;
            fullCrewList = [e.subcontractor_name];
          }

          // Line 1: crew icon + scope or crew label
          var line1 = ct.icon + ' ' + (e.scope_summary || ct.label);
          // Line 2: crew names (or "Need N more" badge if unstaffed)
          var line2Html = '';
          if (hasNeed && !crewLabel) {
            line2Html = '<span class="tl-line tl-line-2 need">⚠️ Need ' + needCount + ' more</span>';
          } else if (hasNeed && crewLabel) {
            line2Html = '<span class="tl-line tl-line-2">' + escHtml(crewLabel) +
              ' <span class="need" style="background:rgba(255,255,255,.25);padding:0 5px;border-radius:4px;font-weight:700;margin-left:3px">+' + needCount + '</span></span>';
          } else if (crewLabel) {
            line2Html = '<span class="tl-line tl-line-2">' + escHtml(crewLabel) + '</span>';
          }

          var tooltip = ct.label + ' · ' + e.start_date + ' → ' + e.end_date +
                        (fullCrewList.length ? '\nCrew: ' + fullCrewList.join(', ') : '') +
                        (e.scope_summary ? '\n' + e.scope_summary : '') +
                        (hasNeed ? '\n⚠ Need ' + needCount + ' more crew' : '');

          html += '<div class="tl-block' + prio + '" data-id="' + e.id + '" ' +
            'style="grid-row:' + (gridRow + rowIdx) + ';grid-column:' + startCol + ' / ' + endCol + ';--block-color:' + ct.color + '" ' +
            'title="' + escHtml(tooltip) + '">' +
            '<span class="tl-line tl-line-1">' + line1 + '</span>' +
            line2Html +
            '</div>';
        });
      });

      gridRow += totalSubRows;
    });

    html += '</div></div>';  // close .tl-grid + .timeline-wrap
    body.innerHTML = html;
    body.querySelectorAll('.tl-block').forEach(function(blk) {
      blk.addEventListener('click', function() {
        openModal(blk.getAttribute('data-id'));
      });
    });
  }

  // ─── AVAILABILITY VIEW ─────────────────────────────────────────────────
  // Shows every tech grouped by primary skill. For each tech, computes
  // "free" or "busy until <date>" based on overlapping schedule_entries.
  // Has a date picker so manager can ask "who's free on May 5?"
  var availDate = null;  // ISO string; null = use today

  function renderAvailability(entries) {
    var body = document.getElementById('scheduleBody');
    var queryDate = availDate || NWSchedule.todayISO();

    // Build a per-tech busy map
    var busy = {};  // techId -> { until, project, shortCode, crewType, entryId }
    entries.forEach(function(e) {
      if (e.status === 'cancelled' || e.status === 'completed') return;
      // Active during queryDate?
      if (!(e.start_date <= queryDate && e.end_date >= queryDate)) return;
      (e.assigned_tech_ids || []).forEach(function(tid) {
        if (!tid) return;
        // Keep the latest end_date per tech if multiple overlap
        if (!busy[tid] || e.end_date > busy[tid].until) {
          busy[tid] = {
            until: e.end_date,
            project: e.project ? e.project.name : '',
            shortCode: e.project ? e.project.short_code : '',
            crewType: e.crew_type,
            entryId: e.id,
            pmName: e.project ? (e.project.pm_name || '') : ''
          };
        }
      });
    });

    // Compute "next assignment" for free techs (entries that start AFTER queryDate)
    var nextAssign = {};  // techId -> { startDate, project, shortCode }
    entries.forEach(function(e) {
      if (e.status === 'cancelled' || e.status === 'completed') return;
      if (e.start_date <= queryDate) return;
      (e.assigned_tech_ids || []).forEach(function(tid) {
        if (!tid) return;
        if (!nextAssign[tid] || e.start_date < nextAssign[tid].startDate) {
          nextAssign[tid] = {
            startDate: e.start_date,
            project: e.project ? e.project.name : '',
            shortCode: e.project ? e.project.short_code : ''
          };
        }
      });
    });

    // Group active techs by primary_skill
    var byCrew = {};
    allTechs.forEach(function(t) {
      if (!t.is_active) return;
      var k = t.primary_skill;
      if (!byCrew[k]) byCrew[k] = [];
      byCrew[k].push(t);
    });

    // Sort each crew: free first (alphabetically), then busy (by end_date asc)
    Object.keys(byCrew).forEach(function(k) {
      byCrew[k].sort(function(a, b) {
        var aBusy = !!busy[a.id], bBusy = !!busy[b.id];
        if (aBusy !== bBusy) return aBusy ? 1 : -1;  // free first
        if (aBusy && bBusy) return busy[a.id].until.localeCompare(busy[b.id].until);
        return a.full_name.localeCompare(b.full_name);
      });
    });

    var html = '';
    // Date picker at top
    html += '<div class="avail-date-picker">' +
      '<label>Show availability on:</label>' +
      '<input type="date" id="availDateInput" value="' + (availDate || NWSchedule.todayISO()) + '">' +
      '<span style="font-size:12px;color:var(--nw-muted)">' +
        Object.keys(busy).length + ' busy / ' +
        (allTechs.filter(function(t){return t.is_active;}).length - Object.keys(busy).length) + ' free' +
      '</span>' +
      '</div>';

    NWSchedule.CREW_TYPES.forEach(function(ct) {
      var list = byCrew[ct.value];
      if (!list || !list.length) return;
      var freeCount = list.filter(function(t) { return !busy[t.id]; }).length;
      html += '<div class="avail-section">' +
        '<h3>' +
          '<span class="crew-icon">' + ct.icon + '</span>' +
          ct.label +
          '<span class="pill">' + freeCount + ' free / ' + list.length + ' total</span>' +
        '</h3>';
      list.forEach(function(t) {
        var b = busy[t.id];
        var n = nextAssign[t.id];
        var rowCls = b ? 'busy' : 'free';
        html += '<div class="avail-tech-row ' + rowCls + '">' +
          '<div class="tech-name">' +
            (t.is_foreman ? '<span class="star">★</span>' : '') +
            escHtml(t.full_name) +
          '</div>';
        if (b) {
          var label = (b.shortCode ? b.shortCode + ' · ' : '') + b.project;
          html += '<span class="avail-tag busy">Busy until ' + NWSchedule.fmtDateShort(b.until) + '</span>' +
                  '<span class="avail-on" data-entry-id="' + b.entryId + '">' + escHtml(label) + '</span>';
        } else {
          html += '<span class="avail-tag free">✅ Available</span>';
          if (n) {
            html += '<span class="avail-on">Next: ' + escHtml((n.shortCode ? n.shortCode + ' · ' : '') + n.project) +
                    ' (' + NWSchedule.fmtDateShort(n.startDate) + ')</span>';
          }
        }
        html += '<div class="tech-position">' + escHtml(t.position || '') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    body.innerHTML = html;

    // Wire up date picker
    var dp = document.getElementById('availDateInput');
    if (dp) {
      dp.addEventListener('change', function() {
        availDate = dp.value || null;
        refreshSchedule();
      });
    }
    // Wire up clicks on busy badges → open the entry
    body.querySelectorAll('.avail-on[data-entry-id]').forEach(function(el) {
      el.addEventListener('click', function() {
        openModal(el.getAttribute('data-entry-id'));
      });
    });
  }

  function renderEntryCard(e) {
    var ct = NWSchedule.crewTypeMeta(e.crew_type);
    var st = NWSchedule.statusMeta(e.status);
    var pr = NWSchedule.priorityMeta(e.priority);

    var techsHtml = '';
    var techNames = [];
    if (e.assigned_tech_names && e.assigned_tech_names.length) {
      techNames = e.assigned_tech_names.slice();
    }
    if (e.is_subcontractor && e.subcontractor_name) {
      techNames.push('🏗️ ' + e.subcontractor_name);
    }
    if (techNames.length) {
      techsHtml = '<div class="entry-techs"><span class="label">Crew</span>' + escHtml(techNames.join(', ')) + '</div>';
    }
    var manpower = '';
    if (e.manpower_needed && (!e.assigned_tech_ids || e.assigned_tech_ids.length < e.manpower_needed)) {
      var need = e.manpower_needed - (e.assigned_tech_ids ? e.assigned_tech_ids.length : 0);
      manpower = '<span class="entry-needed">Need ' + need + ' more</span>';
    }

    var dateStr;
    if (e.start_date === e.end_date) dateStr = NWSchedule.fmtDateShort(e.start_date);
    else dateStr = NWSchedule.fmtDateShort(e.start_date) + ' → ' + NWSchedule.fmtDateShort(e.end_date);
    if (e.start_time) dateStr = e.start_time.substring(0,5) + ' · ' + dateStr;

    var p = e.project;
    var projTitle = p ? ((p.short_code ? p.short_code + ' · ' : '') + p.name) : 'No project';
    var projMetaParts = [];
    if (p && p.customer) projMetaParts.push(escHtml(p.customer));
    if (p && p.pm_name)  projMetaParts.push('👤 PM: <b>' + escHtml(p.pm_name) + '</b>');
    var projMeta = projMetaParts.join(' &middot; ');

    return '<div class="entry-card" data-id="' + e.id + '" style="border-left-color:' + ct.color + '">' +
      '<div class="entry-card-top">' +
        '<span class="entry-crew" style="background:' + ct.color + '">' + ct.icon + ' ' + ct.label + '</span>' +
        '<span class="entry-status">' + st.label + '</span>' +
        (e.priority !== 'normal' ? '<span class="entry-priority" style="color:' + pr.color + '">' + pr.label + '</span>' : '') +
        manpower +
        '<span class="entry-dates">' + dateStr + '</span>' +
      '</div>' +
      '<div class="entry-project">' + escHtml(projTitle) + '</div>' +
      (projMeta ? '<div class="entry-project-meta">' + projMeta + '</div>' : '') +
      techsHtml +
      (e.scope_summary ? '<div class="entry-scope">' + escHtml(e.scope_summary) + '</div>' : '') +
      '</div>';
  }

  function bindEntryClicks() {
    document.querySelectorAll('.entry-card').forEach(function(card) {
      card.addEventListener('click', function() { openModal(card.getAttribute('data-id')); });
    });
  }

  // ─── MODAL ─────────────────────────────────────────────────────────────

  async function openModal(entryId) {
    editingEntryId = entryId || null;
    document.getElementById('modalTitle').textContent = entryId ? 'Edit Schedule Entry' : 'New Schedule Entry';
    document.getElementById('btnDeleteEntry').style.display = (entryId && canWrite) ? 'inline-flex' : 'none';
    document.getElementById('commentsSection').style.display = entryId ? '' : 'none';

    // Reset all inputs INCLUDING the comment input — bug fix: leftover text
    // from a previous entry was making it look like notes had "copied" between
    // entries. Always clear so a fresh modal starts blank.
    document.getElementById('mEntryProject').value = '';
    document.getElementById('mEntryCrew').value = '';
    document.getElementById('mEntryStart').value = NWSchedule.todayISO();
    document.getElementById('mEntryEnd').value = NWSchedule.todayISO();
    document.getElementById('mEntryManpower').value = '';
    document.getElementById('mEntrySub').value = '';
    document.getElementById('mEntryScope').value = '';
    document.getElementById('mEntryNotes').value = '';
    document.getElementById('mEntryPriority').value = 'normal';
    document.getElementById('mEntryStatus').value = 'scheduled';
    document.getElementById('commentInput').value = '';
    document.getElementById('commentsList').innerHTML = '';

    // Reset conflict state for new entry
    conflictMap = {};
    renderTechPicker([]);

    // Lock for non-managers
    var fields = ['mEntryProject','mEntryCrew','mEntryStart','mEntryEnd','mEntryManpower','mEntrySub','mEntryScope','mEntryNotes','mEntryPriority','mEntryStatus'];
    fields.forEach(function(id) {
      document.getElementById(id).disabled = !canWrite;
    });
    document.getElementById('btnSaveEntry').style.display = canWrite ? 'inline-flex' : 'none';

    if (entryId) {
      var r = await NWSchedule.getEntry(entryId);
      if (r.error || !r.data) { showError('Failed to load entry'); closeModal(); return; }
      var e = r.data;
      document.getElementById('mEntryProject').value = e.project_id || '';
      document.getElementById('mEntryCrew').value = e.crew_type;
      document.getElementById('mEntryStart').value = e.start_date;
      document.getElementById('mEntryEnd').value = e.end_date;
      document.getElementById('mEntryManpower').value = e.manpower_needed || '';
      document.getElementById('mEntrySub').value = e.subcontractor_name || '';
      document.getElementById('mEntryScope').value = e.scope_summary || '';
      document.getElementById('mEntryNotes').value = e.notes || '';
      document.getElementById('mEntryPriority').value = e.priority || 'normal';
      document.getElementById('mEntryStatus').value = e.status || 'scheduled';
      // Load conflicts for this date range FIRST, then render with selected
      var cR = await NWSchedule.findTechConflicts(e.start_date, e.end_date, entryId);
      conflictMap = cR.data || {};
      renderTechPicker(e.assigned_tech_ids || []);
      renderComments(e.comments || []);
    } else {
      // New entry — load conflicts for today (default range)
      refreshConflictsAndRender();
    }

    document.getElementById('entryModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('entryModal').classList.remove('open');
    editingEntryId = null;
    // Clear the comment input on close so reopening doesn't show stale text
    document.getElementById('commentInput').value = '';
    document.getElementById('commentsList').innerHTML = '';
  }

  function renderTechPicker(selectedIds) {
    var c = document.getElementById('mEntryTechs');
    var html = '';
    var grouped = {};
    allTechs.forEach(function(t) {
      var k = t.primary_skill;
      if (!grouped[k]) grouped[k] = [];
      grouped[k].push(t);
    });
    NWSchedule.CREW_TYPES.forEach(function(ct) {
      var list = grouped[ct.value];
      if (ct.value === 'foreman') list = grouped['foreman'];
      if (!list || !list.length) return;
      html += '<div style="font-size:10px;font-weight:700;color:var(--nw-muted);text-transform:uppercase;letter-spacing:.5px;margin:6px 4px 2px;">' + ct.icon + ' ' + ct.label + '</div>';
      list.forEach(function(t) {
        var sel = selectedIds.indexOf(t.id) !== -1;
        // A tech is "unavailable" only if conflicted AND not already on this entry.
        // Already-selected techs stay selectable so the user can DEselect them.
        var conflicts = conflictMap[t.id];
        var unavailable = (!sel) && conflicts && conflicts.length;
        var classes = 'tech-chip';
        if (sel) classes += ' selected';
        if (t.is_foreman) classes += ' foreman';
        if (unavailable) classes += ' unavailable';
        var titleAttr = '';
        if (unavailable) {
          var c0 = conflicts[0];
          var label = (c0.projectShortCode ? c0.projectShortCode + ' · ' : '') + (c0.projectName || 'another job');
          titleAttr = ' title="Already booked on ' + escHtml(label) + ' (' + c0.startDate + ' to ' + c0.endDate + ')"';
        }
        html += '<span class="' + classes + '" data-tech-id="' + t.id + '"' + titleAttr + '>' +
          escHtml(t.full_name) +
          '</span>';
      });
    });
    c.innerHTML = html;
    c.querySelectorAll('.tech-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        if (!canWrite) return;
        // Block clicks on unavailable chips — show toast with the conflict
        if (chip.classList.contains('unavailable')) {
          var techId = chip.getAttribute('data-tech-id');
          var t = allTechs.find(function(x) { return x.id === techId; });
          var c0 = (conflictMap[techId] || [])[0];
          var name = t ? t.full_name : 'This tech';
          var label = c0 ? ((c0.projectShortCode ? c0.projectShortCode + ' · ' : '') + (c0.projectName || 'another job')) : 'another job';
          var dates = c0 ? (c0.startDate + ' → ' + c0.endDate) : '';
          showConflictToast(name + ' is already booked on ' + label + (dates ? ' (' + dates + ')' : '') + '. Remove them from there first.');
          chip.classList.add('tech-chip-shake');
          setTimeout(function() { chip.classList.remove('tech-chip-shake'); }, 350);
          return;
        }
        chip.classList.toggle('selected');
      });
    });
  }

  // Re-fetch conflicts for the current date range and re-render the picker.
  // Preserves currently-selected techs but auto-deselects (with a toast) any
  // that are now conflicting with another entry.
  async function refreshConflictsAndRender() {
    var start = document.getElementById('mEntryStart').value;
    var end   = document.getElementById('mEntryEnd').value;
    if (!start || !end || end < start) {
      conflictMap = {};
      var current = getSelectedTechs().ids;
      renderTechPicker(current);
      return;
    }
    var r = await NWSchedule.findTechConflicts(start, end, editingEntryId);
    conflictMap = r.data || {};
    var current = getSelectedTechs().ids;
    var freshlyConflicting = [];
    var stillSelected = current.filter(function(id) {
      if (conflictMap[id] && conflictMap[id].length) {
        freshlyConflicting.push(id);
        return false;
      }
      return true;
    });
    if (freshlyConflicting.length) {
      var names = freshlyConflicting.map(function(id) {
        var t = allTechs.find(function(x) { return x.id === id; });
        return t ? t.full_name : 'a tech';
      }).join(', ');
      showConflictToast('Auto-removed: ' + names + ' is already booked in the new date range.');
    }
    renderTechPicker(stillSelected);
  }

  // Debounced version for date input change handlers
  function scheduleConflictRefresh() {
    if (conflictDebounce) clearTimeout(conflictDebounce);
    conflictDebounce = setTimeout(refreshConflictsAndRender, 250);
  }

  function showConflictToast(msg) {
    var existing = document.querySelector('.conflict-toast');
    if (existing) existing.remove();
    var el = document.createElement('div');
    el.className = 'conflict-toast';
    el.textContent = '⚠️ ' + msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 4500);
  }

  function getSelectedTechs() {
    var ids = [];
    var names = [];
    document.querySelectorAll('#mEntryTechs .tech-chip.selected').forEach(function(chip) {
      var id = chip.getAttribute('data-tech-id');
      ids.push(id);
      var t = allTechs.find(function(x) { return x.id === id; });
      if (t) names.push(t.full_name);
    });
    return { ids: ids, names: names };
  }

  async function saveEntry() {
    var pid = document.getElementById('mEntryProject').value;
    var crew = document.getElementById('mEntryCrew').value;
    var start = document.getElementById('mEntryStart').value;
    var end = document.getElementById('mEntryEnd').value;
    if (!pid || !crew || !start || !end) {
      showError('Please fill in Project, Crew Type, Start, and End dates.');
      return;
    }
    if (end < start) { showError('End date must be ≥ start date.'); return; }

    // Final server-side conflict check (in case the user selected a tech and
    // then someone else booked them on a different page right before save).
    var freshConflicts = await NWSchedule.findTechConflicts(start, end, editingEntryId);
    if (!freshConflicts.error) conflictMap = freshConflicts.data || {};

    var techs = getSelectedTechs();
    var blocking = techs.ids.filter(function(id) { return conflictMap[id] && conflictMap[id].length; });
    if (blocking.length) {
      var names = blocking.map(function(id) {
        var t = allTechs.find(function(x) { return x.id === id; });
        return t ? t.full_name : 'a tech';
      }).join(', ');
      // Re-render to show the conflict markers and stop the save
      renderTechPicker(techs.ids.filter(function(id) { return blocking.indexOf(id) === -1; }));
      showConflictToast('Cannot save: ' + names + ' is already booked in another job for these dates. Remove them from the other entry first.');
      return;
    }
    var sub = document.getElementById('mEntrySub').value.trim();
    var entry = {
      project_id: pid,
      crew_type: crew,
      start_date: start,
      end_date: end,
      manpower_needed: parseInt(document.getElementById('mEntryManpower').value, 10) || null,
      assigned_tech_ids: techs.ids,
      assigned_tech_names: techs.names,
      is_subcontractor: !!sub,
      subcontractor_name: sub || null,
      scope_summary: document.getElementById('mEntryScope').value.trim() || null,
      notes: document.getElementById('mEntryNotes').value.trim() || null,
      priority: document.getElementById('mEntryPriority').value,
      status: document.getElementById('mEntryStatus').value
    };

    var r = editingEntryId
      ? await NWSchedule.updateEntry(editingEntryId, entry)
      : await NWSchedule.createEntry(entry);
    if (r.error) { showError('Save failed: ' + r.error.message); return; }
    closeModal();
    refreshSchedule();
  }

  async function deleteEntry() {
    if (!editingEntryId) return;
    if (!confirm('Delete this schedule entry? This cannot be undone.')) return;
    var r = await NWSchedule.deleteEntry(editingEntryId);
    if (r.error) { showError('Delete failed: ' + r.error.message); return; }
    closeModal();
    refreshSchedule();
  }

  // ─── COMMENTS ─────────────────────────────────────────────────────────

  function renderComments(comments) {
    var c = document.getElementById('commentsList');
    if (!comments || !comments.length) {
      c.innerHTML = '<div style="font-size:12px;color:var(--nw-muted);padding:8px 0">No comments yet.</div>';
      return;
    }
    var html = '';
    comments.forEach(function(cm) {
      var when = new Date(cm.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      // Show Edit/Delete buttons if user is the author OR is a manager/admin
      var canModify = (cm.author_id && cm.author_id === currentUserId) || canWrite;
      var actions = canModify
        ? '<span class="comment-actions">' +
            '<button class="comment-action-btn" data-cmt-edit="' + escHtml(cm.id) + '">✎ Edit</button>' +
            '<button class="comment-action-btn del" data-cmt-del="' + escHtml(cm.id) + '">Delete</button>' +
          '</span>'
        : '';
      html += '<div class="comment" data-cmt-id="' + escHtml(cm.id) + '">' +
        '<div class="comment-header">' +
          '<span class="comment-author">' + escHtml(cm.author_name || 'Anonymous') + '</span>' +
          '<span class="comment-time">' + when + '</span>' +
          actions +
        '</div>' +
        '<div class="comment-body" data-body="1">' + escHtml(cm.body) + '</div>' +
        '</div>';
    });
    c.innerHTML = html;
    bindCommentActions();
  }

  function bindCommentActions() {
    document.querySelectorAll('[data-cmt-edit]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        startEditComment(btn.getAttribute('data-cmt-edit'));
      });
    });
    document.querySelectorAll('[data-cmt-del]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        deleteCommentHandler(btn.getAttribute('data-cmt-del'));
      });
    });
  }

  function startEditComment(commentId) {
    var commentEl = document.querySelector('.comment[data-cmt-id="' + commentId + '"]');
    if (!commentEl) return;
    var bodyEl = commentEl.querySelector('[data-body]');
    var currentText = bodyEl.textContent;
    // Replace body with a textarea + Save/Cancel
    var editArea = document.createElement('div');
    editArea.className = 'comment-edit-area';
    editArea.innerHTML =
      '<textarea>' + escHtml(currentText) + '</textarea>' +
      '<div class="comment-edit-buttons">' +
        '<button class="save-btn">Save</button>' +
        '<button class="cancel-btn">Cancel</button>' +
      '</div>';
    bodyEl.style.display = 'none';
    bodyEl.parentNode.appendChild(editArea);
    // Hide the normal action buttons while editing
    var actions = commentEl.querySelector('.comment-actions');
    if (actions) actions.style.display = 'none';
    var ta = editArea.querySelector('textarea');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    editArea.querySelector('.save-btn').addEventListener('click', async function() {
      var newBody = ta.value.trim();
      if (!newBody) { showError('Comment cannot be empty.'); return; }
      var r = await NWSchedule.updateComment(commentId, newBody);
      if (r.error) { showError('Edit failed: ' + r.error.message); return; }
      // Refresh the comment list
      var cR = await NWSchedule.listComments(editingEntryId);
      renderComments(cR.data || []);
    });
    editArea.querySelector('.cancel-btn').addEventListener('click', function() {
      editArea.remove();
      bodyEl.style.display = '';
      if (actions) actions.style.display = '';
    });
  }

  async function deleteCommentHandler(commentId) {
    if (!confirm('Delete this note?')) return;
    var r = await NWSchedule.deleteComment(commentId);
    if (r.error) { showError('Delete failed: ' + r.error.message); return; }
    var cR = await NWSchedule.listComments(editingEntryId);
    renderComments(cR.data || []);
  }

  async function addCommentHandler() {
    if (!editingEntryId) return;
    var input = document.getElementById('commentInput');
    var body = input.value.trim();
    if (!body) return;
    var r = await NWSchedule.addComment(editingEntryId, body);
    if (r.error) { showError('Comment failed: ' + r.error.message); return; }
    input.value = '';
    var c = await NWSchedule.listComments(editingEntryId);
    renderComments(c.data || []);
  }

  // ─── HELPERS ───────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showError(msg) {
    alert(msg);
  }
})();
</script>
